<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <title>Grupo Fotográfico Centro</title>
  <link rel="shortcut icon" href="./assets/icon/favicon.ico">

  <base href="/" />

  <meta name="color-scheme" content="light dark" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <!-- add to homescreen for ios -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

</head>

<body>
  <div id="gfc-diag" style="position:fixed;top:0;left:0;right:0;z-index:99999;padding:8px 12px;font:12px/1.4 sans-serif;background:#ffc;color:#333;text-align:center;border-bottom:2px solid #e80;display:none">GFC cargando...</div>

  <script nonce="gfc-diag-start">
    window.__gfcLoaded = false;
    setTimeout(function() {
      var el = document.getElementById('gfc-diag');
      if (el && !window.__gfcLoaded) {
        el.style.display = 'block';
        el.style.background = '#fcc';
        el.style.borderColor = '#c00';
        el.textContent = 'GFC no arranc\u00f3 en 8s. Posible error en bootstrap.';
      }
    }, 8000);
  </script>

  <app-root></app-root>

  <script nomodule nonce="gfc-fallback">
    document.getElementById('gfc-diag') && (document.getElementById('gfc-diag').style.display = 'block') && (document.getElementById('gfc-diag').textContent = 'Este navegador no soporta ES modules. Prob\u00e1 con Chrome o Safari actualizado.');
  </script>
</body>

</html>
