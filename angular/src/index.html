<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <title>Grupo Fotográfico Centro</title>
  <link rel="shortcut icon" href="./assets/icon/favicon.ico">
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#212529">

  <base href="/" />

  <meta name="color-scheme" content="light dark" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <!-- add to homescreen for ios -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <style nonce="gfc-loader-style">
    @keyframes gfc-loader-bar {
      0%, 100% { width: 40px; opacity: 0.3; }
      50% { width: 80px; opacity: 1; }
    }
  </style>

</head>

<body>
  <!-- Loader DOM-based (funciona en todos los browsers, incluyendo Safari iOS) -->
  <div id="gfc-loader" class="gfc-loader">
    <span class="gfc-loader-text">Cargando\u2026</span>
    <span class="gfc-loader-bar"></span>
  </div>

  <script nonce="gfc-dark-reader">
    (function() {
      if (localStorage.getItem('darkMode') === 'true') {
        document.documentElement.setAttribute('data-bs-theme', 'dark');
        document.body.classList.add('dark');
        var loader = document.getElementById('gfc-loader');
        if (loader) loader.style.background = '#121212';
      }
    })();
  </script>

  <div id="gfc-diag" style="position:fixed;top:0;left:0;right:0;z-index:99999;padding:8px 12px;font:12px/1.4 sans-serif;background:#ffc;color:#333;text-align:center;border-bottom:2px solid #e80;display:none">GFC cargando...</div>

  <style nonce="gfc-loader-style">
    .gfc-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100000;
      background: #fff;
    }
    .gfc-loader-text {
      font: 16px/1.4 sans-serif;
      color: #666;
    }
    .gfc-loader-bar {
      margin-top: 8px;
      width: 40px;
      height: 4px;
      background: #3880ff;
      border-radius: 2px;
      animation: gfc-loader-bar 1.2s ease-in-out infinite;
    }
    html[data-bs-theme="dark"] .gfc-loader {
      background: #121212;
    }
    html[data-bs-theme="dark"] .gfc-loader-text {
      color: #ccc;
    }
    html.hydrated .gfc-loader,
    html.ion-ce .gfc-loader,
    html.gfc-force-visible .gfc-loader {
      display: none;
    }
  </style>

  <!-- Watchdog: si Ionic no se hidrata en 8s, fuerza visibilidad -->
  <script nonce="gfc-watchdog">
    (function() {
      var GFC_WATCHDOG_DELAY = 8000;
      var gfcTimer = setTimeout(function gfcWatchdog() {
        var html = document.documentElement;
        if (html.classList.contains('hydrated') || html.classList.contains('ion-ce') || html.classList.contains('gfc-force-visible')) return;
        html.classList.add('ion-ce');
        var d = document.getElementById('gfc-diag');
        if (d) {
          d.style.display = 'block';
          d.textContent = 'La aplicaci\u00f3n est\u00e1 demorando. Si ves esto por m\u00e1s de 30s, recarg\u00e1 la p\u00e1gina.';
        }
      }, GFC_WATCHDOG_DELAY);
    })();
  </script>

  <script nonce="gfc-diag-start">
    window.__gfcLoaded = false;
    setTimeout(function() {
      var el = document.getElementById('gfc-diag');
      if (el && !window.__gfcLoaded) {
        el.style.display = 'block';
        el.style.background = '#fcc';
        el.style.borderColor = '#c00';
        el.textContent = 'GFC no arranc\u00f3 en 8s. Posible error en bootstrap.';
      }
    }, 8000);
  </script>

  <app-root></app-root>

  <script nomodule nonce="gfc-fallback">
    document.getElementById('gfc-diag') && (document.getElementById('gfc-diag').style.display = 'block') && (document.getElementById('gfc-diag').textContent = 'Este navegador no soporta ES modules. Prob\u00e1 con Chrome o Safari actualizado.');
  </script>
</body>

</html>
