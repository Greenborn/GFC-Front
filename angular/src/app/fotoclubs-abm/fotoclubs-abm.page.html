<ion-content>
  <div class="container">
    <div class="row">
      <div class="col-12 col-md-3" *ngIf="mostrarFiltro">
        <div class="row">
          <div class="col">
            <ion-title class="mt-3">Búsqueda</ion-title>
            <app-search-bar
              [(data)]="fotoclubs"
              [atributosObj]="atributosBusqueda"
            >
            </app-search-bar>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="row">
          <div class="col-12">
            <div class="container-fluid p-0 pb-3">

              <div class="row justify-content-start align-items-center mt-3 mb-3">
                <h2 class="mt-3 mb-3 me-3">
                  Organizaciones
                </h2>

                <ion-fab-button (click)="postFotoclub()" size="small">
                  <ion-icon name="add"></ion-icon>
                </ion-fab-button>

              </div>

              <div class="row align-items-center">
                <div class="col"></div>

                <div class="col-2 col-sm-1">

                  <div class="row justify-content-center align-items-center align-self-center">
                    <ion-button
                      (click)="mostrarFiltro = !mostrarFiltro"
                      color="medium" expand="block"
                      class="justify-content-center align-items-center align-self-center">

                      <ion-icon name="funnel"></ion-icon>
                    </ion-button>
                  </div>
                </div>
              </div>
            </div>

            <ion-list class="d-none d-sm-block cabecera">
              <ion-item color="dark">
                <div class="container-fluid">
                  <div class="col">
                    <div class="row">
                      <div class="col-9 col-md-10">
                        <div class="row">
                          <app-th-sort
                            [sortFn]="funcionesOrdenamiento['fotoclub']"
                            [(data)]="fotoclubs"
                            title="Organización"
                          ></app-th-sort>
                        </div>
                      </div>
                      <div class="col-2 col-md-1 text-center">
                        <div class="row">
                          <b>Habilitado</b>
                        </div>
                      </div>
                      <div class="col-1 col-md-1 text-center">
                        <b>Acciones</b>
                      </div>
                    </div>
                  </div>
                </div>
              </ion-item>
            </ion-list>
            
            <ion-list *ngIf="fotoclubs.length > 0; else texto">
              <ion-item *ngFor="let f of fotoclubs">
                <div class="container-fluid">
                  <div class="row">
                    <div class="col-12 col-sm-9 col-md-10">
                      <div class="row align-items-center justify-content-between">
                        <div class="col-12">
                          <div class="row">
                            <div class="col-12">
                              <div class="row">
                                <ion-thumbnail class="h-100">
                                  <ion-img
                                    class="imgFotoclub"
                                    [ngStyle]="aspecto && (f.photo_url == null || f.photo_url == '') ? {'filter': 'invert(100)' }:{ 'filter': 'invert(0)'}"
                                    [src]="f.photo_url != null && f.photo_url != ''  ? configService.imageUrl(f.photo_url) : './assets/no-pictures.png' "
                                  ></ion-img>
                                </ion-thumbnail>

                                <ion-label class="ms-3">
                                  <ion-text title="Nombre">
                                    <b>{{f.name}}</b>
                                  </ion-text>
                                </ion-label>
                              </div>
                            </div>
                          </div>
                        </div>
                        <div class="col-2 d-sm-none justify-content-center">
                          <ion-buttons class="justify-content-center">
                            <ion-button (click)="mostrarAcciones($event, f)">
                              <ion-icon
                                slot="start"
                                ios="ellipsis-horizontal"
                                md="ellipsis-vertical"
                              ></ion-icon>
                            </ion-button>
                          </ion-buttons>
                        </div>
                      </div>
                    </div>
                    <div class="col-2 col-md-1 align-self-center text-center d-none d-sm-block">
                      <ion-badge [color]="f.enabled ? 'success' : 'danger'">
                        {{ f.enabled ? 'Si' : 'No' }}
                      </ion-badge>
                    </div>
                    <div class="col-2 col-md-1 align-self-center text-center d-none d-sm-block">
                      <ion-buttons class="justify-content-center">
                        <ion-button (click)="postFotoclub(f)">
                          <ion-icon name="create"></ion-icon>
                        </ion-button>
                        <ion-button *ngIf="false" (click)="deleteFotoclub(f)">
                          <ion-icon name="trash"></ion-icon>
                        </ion-button>
                      </ion-buttons>
                    </div>
                  </div>
                </div>
              </ion-item>
            </ion-list>

            <ng-template #texto>
                <ion-item>No hay fotoclubs</ion-item>
            </ng-template>

          </div>
        </div>
      </div>
    </div>
  </div>

</ion-content>
