<ion-content class="p-3">
  <div class="container">
    <div class="row">
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <ion-card>
          <ion-card-header>
            <ion-card-title>Fotografías</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <button class="btn btn-outline-primary w-100" (click)="abrirBusquedaFotografias()">Búsqueda de Fotografías</button>
          </ion-card-content>
        </ion-card>
      </div>
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <ion-card>
          <ion-card-header>
            <ion-card-title>Concursos</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <ion-item>
              <ion-label>Seleccionar concurso</ion-label>
              <ion-select [(ngModel)]="concursoSeleccionado" interface="popover" placeholder="Elige un concurso">
                <ion-select-option *ngFor="let c of concursos" [value]="c">{{c.name}}</ion-select-option>
              </ion-select>
            </ion-item>
            <button class="btn btn-primary w-100" [disabled]="!concursoSeleccionado" (click)="descargarListado()">Listado Inscriptos</button>
          </ion-card-content>
        </ion-card>
      </div>
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <ion-card>
          <ion-card-header>
            <ion-card-title>Juzgamiento</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <input #fileInput type="file" webkitdirectory directory multiple (change)="onFileSelected($event)" style="display: none;" />
            <button class="btn btn-secondary w-100" (click)="fileInput.click()">Cargar Resultados</button>
          </ion-card-content>
        </ion-card>
      </div>
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <ion-card>
          <ion-card-header>
            <ion-card-title>Ranking</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <button class="btn btn-primary w-100" (click)="recalcularRanking()">Recalcular Ranking</button>
          </ion-card-content>
        </ion-card>
      </div>
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <ion-card>
          <ion-card-header>
            <ion-card-title>Premiadas Temporada</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <button class="btn btn-info w-100" (click)="descargarCompiladoGanadoras()">Descargar Compilado</button>
          </ion-card-content>
        </ion-card>
      </div>
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <ion-card>
          <ion-card-header>
            <ion-card-title>Fotografías del Año</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <input #folderInput type="file" webkitdirectory directory multiple (change)="onFolderSelected($event)" style="display: none;" />
            <button class="btn btn-success w-100" (click)="folderInput.click()">Seleccionar Carpeta</button>
            <button class="btn btn-primary w-100" (click)="abrirModalAgregarGrabacion()">Agregar Grabación</button>
          </ion-card-content>
        </ion-card>
      </div>
    </div>
  </div>
</ion-content>

<!-- Modal para Agregar Grabación -->
<ion-modal #modalGrabacion [isOpen]="isModalGrabacionOpen" (didDismiss)="cerrarModalGrabacion()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>Agregar Grabación</ion-title>
        <div class="d-flex gap-1">
          <button class="btn btn-outline-primary" (click)="cerrarModalGrabacion()">Cerrar</button>
        </div>
      </ion-toolbar>
    </ion-header>
    <ion-content class="p-3">
      <ion-item>
        <ion-label position="stacked">Temporada</ion-label>
        <ion-select [(ngModel)]="grabacionData.temporada" interface="popover">
          <ion-select-option [value]="anioActual">{{anioActual}}</ion-select-option>
          <ion-select-option [value]="anioAnterior">{{anioAnterior}}</ion-select-option>
        </ion-select>
      </ion-item>
      
      <ion-item [class.ion-invalid]="urlInvalida && grabacionData.url.length > 0">
        <ion-label position="stacked">URL</ion-label>
        <ion-input 
          [(ngModel)]="grabacionData.url" 
          (ionChange)="validarUrl()" 
          placeholder="https://ejemplo.com/grabacion.json"
          type="url">
        </ion-input>
      </ion-item>
      <ion-note color="danger" *ngIf="urlInvalida && grabacionData.url.length > 0">
        Por favor, ingrese una URL válida
      </ion-note>
      
      <button 
        class="btn btn-outline-primary w-100 mt-3" 
        (click)="agregarGrabacion()" 
        [disabled]="urlInvalida || !grabacionData.url">
        Agregar
      </button>
    </ion-content>
  </ng-template>
</ion-modal>
