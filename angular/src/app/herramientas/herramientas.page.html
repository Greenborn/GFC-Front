<div class="container-fluid py-3">
  <div class="container">
    <div class="row">
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <div class="card mb-3">
          <div class="card-header">
            <h5 class="card-title">Fotografías</h5>
          </div>
          <div class="card-body">
            <button class="btn btn-outline-primary w-100" (click)="abrirBusquedaFotografias()">Búsqueda de Fotografías</button>
          </div>
        </div>
      </div>
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <div class="card mb-3">
          <div class="card-header">
            <h5 class="card-title">Concursos</h5>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label">Seleccionar concurso</label>
              <select class="form-select" [(ngModel)]="concursoSeleccionado" placeholder="Elige un concurso">
                <option *ngFor="let c of concursos" [value]="c">{{c.name}}</option>
              </select>
            </div>
            <button class="btn btn-primary w-100" [disabled]="!concursoSeleccionado" (click)="descargarListado()">Listado Inscriptos</button>
          </div>
        </div>
      </div>
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <div class="card mb-3">
          <div class="card-header">
            <h5 class="card-title">Juzgamiento</h5>
          </div>
          <div class="card-body">
            <input #fileInput type="file" webkitdirectory directory multiple (change)="onFileSelected($event)" style="display: none;" />
            <button class="btn btn-secondary w-100" (click)="fileInput.click()">Cargar Resultados</button>
          </div>
        </div>
      </div>
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <div class="card mb-3">
          <div class="card-header">
            <h5 class="card-title">Ranking</h5>
          </div>
          <div class="card-body">
            <button class="btn btn-primary w-100" (click)="recalcularRanking()">Recalcular Ranking</button>
          </div>
        </div>
      </div>
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <div class="card mb-3">
          <div class="card-header">
            <h5 class="card-title">Premiadas Temporada</h5>
          </div>
          <div class="card-body">
            <button class="btn btn-info w-100" (click)="descargarCompiladoGanadoras()">Descargar Compilado</button>
          </div>
        </div>
      </div>
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <div class="card mb-3">
          <div class="card-header">
            <h5 class="card-title">Fotografías del Año</h5>
          </div>
          <div class="card-body">
            <input #folderInput type="file" webkitdirectory directory multiple (change)="onFolderSelected($event)" style="display: none;" />
            <button class="btn btn-success w-100" (click)="folderInput.click()">Seleccionar Carpeta</button>
            <button class="btn btn-primary w-100" (click)="abrirModalAgregarGrabacion()">Agregar Grabación</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal para Agregar Grabación -->
<div class="modal" tabindex="-1" [class.show]="isModalGrabacionOpen" [style.display]="isModalGrabacionOpen ? 'block' : 'none'">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header d-flex justify-content-between align-items-center">
        <h5 class="modal-title">Agregar Grabación</h5>
        <button class="btn btn-outline-primary" (click)="cerrarModalGrabacion()">Cerrar</button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Temporada</label>
          <select class="form-select" [(ngModel)]="grabacionData.temporada">
            <option [value]="anioActual">{{anioActual}}</option>
            <option [value]="anioAnterior">{{anioAnterior}}</option>
          </select>
        </div>
        
        <div class="mb-3" [class.is-invalid]="urlInvalida && grabacionData.url.length > 0">
          <label class="form-label">URL</label>
          <input class="form-control" 
            [(ngModel)]="grabacionData.url" 
            (change)="validarUrl()" 
            placeholder="https://ejemplo.com/grabacion.json"
            type="url">
        </div>
        <small class="text-danger" *ngIf="urlInvalida && grabacionData.url.length > 0">
          Por favor, ingrese una URL válida
        </small>
        
        <button 
          class="btn btn-outline-primary w-100 mt-3" 
          (click)="agregarGrabacion()" 
          [disabled]="urlInvalida || !grabacionData.url">
          Agregar
        </button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade" [class.show]="isModalGrabacionOpen" (click)="cerrarModalGrabacion()"></div>
