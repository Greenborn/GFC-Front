<div class="modal-header gfc-modal-header d-flex justify-content-between align-items-center">
  <h5 class="modal-title mb-0">Carga de Resultados</h5>
  <button class="btn gfc-btn-back btn-sm" (click)="modalController.dismiss()">
    <i class="bi bi-x-lg"></i>
  </button>
</div>
<div class="modal-body">
  <h5>Estructura de archivos y directorios:</h5>
  <pre style="white-space: pre-wrap; font-size: 14px; background: #f8f8f8; padding: 12px; border-radius: 6px;">{{ estructura }}</pre>
</div>
