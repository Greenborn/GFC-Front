<div class="list-group list-group-flush">
  @for (a of acciones; track a) {
    <button type="button" class="list-group-item list-group-item-action mb-3"
      (click)="action(a.accion, a.params)"
      [attr.aria-label]="a.label">
      <i class="bi" [ngClass]="'bi-' + a.icon" aria-hidden="true"></i>
      <span class="ms-2">{{a.label}}</span>
    </button>
  }
</div>
