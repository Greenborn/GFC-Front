<div class="mb-3 search-bar">
  <div class="col">
    <div class="row">
      <div class="input-group">
        <input class="form-control" type="search"
          #queryInput
          placeholder="Buscar"
          (input)="output()"
        ></div>
        @if (innerSelect) {
          <select class="form-select me-3"
            (change)="output()"
            >
          @for (a of atributosPasados; track a) {
            <option
              [value]="getAtributoValor(a)"
              >{{ getAtributoValorMostrado(a) }}</option
              >
            }
          </select>
        }
      </div>
      @if (!innerSelect && !hideFieldSelector && atributosPasados?.length > 1) {
        <div class="row">
          <div class="list-group list-group-flush">
            <div class="d-flex flex-column gap-2"
              (change)="changeRadio($event.target)"
              >
              <div class="list-group-item fw-bold gfc-list-header">
                <div class="row align-items-center">
                  <label class="form-label">Filtrar por:</label>
                  @if (atributoSelected != '') {
                    <button
                      (click)="changeRadio()"
                      class="btn btn-link"
                      >
                      <i class="bi bi-x-lg"></i>
                    </button>
                  }
                </div>
              </div>
              @for (a of atributosObj; track a) {
                <div class="mb-3">
                  <label class="form-label">{{ a.valorMostrado }}</label>
                  <div class="form-check">
                    <input type="radio" class="form-check-input" [value]="a.valor">
                  </div>
                </div>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
