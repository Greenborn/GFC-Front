<div class="mb-3 search-bar">
  <div class="input-group">
    <input class="form-control" type="search"
      #queryInput
      placeholder="Buscar"
      (input)="output()"
    >
    @if (innerSelect) {
      <select class="form-select flex-grow-0 w-auto"
        (change)="output()"
      >
        @for (a of atributosPasados; track a) {
          <option [value]="getAtributoValor(a)">{{ getAtributoValorMostrado(a) }}</option>
        }
      </select>
    }
  </div>
  @if (!innerSelect && !hideFieldSelector && atributosObj?.length > 1) {
    <div class="mt-2">
      <div class="d-flex flex-wrap align-items-center gap-2">
        <span class="fw-semibold text-muted small">Filtrar por:</span>
        @for (a of atributosObj; track a) {
          <label class="form-check form-check-inline mb-0">
            <input type="radio" class="form-check-input" name="search-attr"
              [value]="a.valor" (change)="changeRadio($event.target)"
              [checked]="atributoSelected === a.valor">
            <span class="form-check-label">{{ a.valorMostrado }}</span>
          </label>
        }
        @if (atributoSelected) {
          <button (click)="changeRadio()" class="btn btn-sm btn-link text-decoration-none p-0">
            <i class="bi bi-x-lg"></i>
          </button>
        }
      </div>
    </div>
  }
</div>
