<button
  class="btn btn-success w-100"
  type="submit"
  [disabled]="disabled"
  (click)="post.emit()"
  >
  @if (posting) {
    <div class="spinner-border spinner-border-sm text-primary" role="status"
      ><span class="visually-hidden">Loading...</span></div>
    } @else {
      <span>{{text}}</span>
    }
  </button>
