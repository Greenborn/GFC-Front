@if (passwordInput?.value) {
  <button
    (click)="toggleVisibility()"
    class="btn btn-link"
    [disabled]="passwordInput.value == ''"
    [attr.aria-label]="visibility ? 'Ocultar contraseña' : 'Mostrar contraseña'"
    type="button"
    >
    @if (visibility == true) {
      <i class="bi bi-eye-slash" aria-hidden="true"></i>
    } @else {
      <i class="bi bi-eye" aria-hidden="true"></i>
    }
  </button>
} @else {
  <span style="width: 38px; display: inline-block;" aria-hidden="true"></span>
}
