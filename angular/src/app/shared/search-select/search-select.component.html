    <div class="row align-items-center me-3"
      *ngIf="interface == 'popover'; else list"
    >
      <!-- <div class="col-2 p-0" *ngIf="atributoSelected != ''"> -->
        <button (click)="changeQuery()" class="btn btn-link"
          *ngIf="atributoSelected != ''"
        >
          <ion-icon name="close-outline"></ion-icon>
        </button>
      <!-- </div> -->
      <!-- <div class="col p-0"> -->
        <ion-item >
          <ion-label
            position="stacked"
            >{{ title }}</ion-label
          >
          <ion-select #atributoSelect
            *ngIf="!updatingSelect"  okText="Aceptar" cancelText="Cancelar"
            (ionChange)="changeQuery($event.target)"
            interface="popover"
            [value]="atributoSelectedAsInt"
          >
            <ion-select-option 
              *ngFor="let o of optionsData"
              [value]="o[optionsProps.valueProp]"
              >{{ getPropertyName(o) }}</ion-select-option
            >
          </ion-select>
        </ion-item>
      <!-- </div> -->
    </div>

    <ng-template #list>
      <div class="row">
        <ion-list>
          <ion-list-header>
            <div class="row align-items-center">
              <ion-label>{{ title }}</ion-label>
              <button
                *ngIf="atributoSelected != ''"
                (click)="changeQuery()"
                class="btn btn-link"
              >
                <ion-icon name="close-outline"></ion-icon>
              </button>
            </div>
          </ion-list-header>
          <ion-item *ngFor="let o of optionsData" lines="none">
            <button
              class="btn w-100"
              [ngClass]="atributoSelected == o[optionsProps.valueProp] ? 'btn-primary' : 'btn-link'"
              (click)="changeQuery(o[optionsProps.valueProp])"
            >
              {{ getPropertyName(o) }}
            </button>
          </ion-item>
        </ion-list>
      </div>
    </ng-template>
