<div class="searchable-select" #dropdown>
  <div class="select-trigger" (click)="toggleDropdown()">
    <span class="select-text" [class.placeholder]="!selectedItem">
      {{ displayText || placeholder }}
    </span>
    <span class="select-arrow" [class.open]="isOpen">&#9662;</span>
  </div>

  <div class="select-dropdown" *ngIf="isOpen">
    <div class="search-wrapper">
      <input
        class="search-input"
        type="text"
        [(ngModel)]="searchText"
        placeholder="Buscar..."
        autofocus
      />
    </div>
    <div class="options-list">
      <div
        class="option-item"
        *ngFor="let item of filteredItems"
        [class.selected]="item[itemValueField] === value"
        (click)="selectItem(item)"
      >
        {{ item[itemTextField] }}
      </div>
      <div class="option-empty" *ngIf="filteredItems.length === 0">
        Sin resultados
      </div>
    </div>
  </div>
</div>
