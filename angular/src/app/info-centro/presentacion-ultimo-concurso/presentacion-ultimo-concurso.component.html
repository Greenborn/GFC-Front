<div class="uc-hero" style="background-image: url({{bg_image}});">
  <div class="uc-overlay"></div>
  <div class="uc-content" *ngIf="concurso != undefined">
    <span class="uc-badge">{{concurso.sub_title}}</span>
    <h1 class="uc-title">{{concurso.name}}</h1>
    <p class="uc-desc">Se encuentra abierta la inscripción para el próximo concurso del GFC.</p>
    <ion-button class="uc-btn" [routerLink]="['/concursos/' + concurso.id]">Ver información</ion-button>
  </div>
</div>
