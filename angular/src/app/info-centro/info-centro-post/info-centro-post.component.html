<div [ngClass]="responsiveService.isDesktop ? 'gfc-modal-page' : ''">
  <div class="gfc-modal-header">
    <div class="row align-items-center ms-3 me-3">
      <div class="col">
        <h5 class="mb-0">
          {{ formTitle }}
        </h5>
      </div>
      <div class="col-1 d-none d-md-block">
        <button class="btn btn-link" (click)="modalController.dismiss()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="w-100 inner-content float-md-start">
    <div class="container-fluid">
      <div class="row justify-content-center align-self-center">
        <div class="col">
          <div class="row">
            <div class="col">

              @if (parrafo != undefined) {
                <div class="mb-3 w-100 mb-3">
                  <label class="form-label" position="floating">Título</label>
                  <input class="form-control"
                    [(ngModel)]="parrafo.title"
                    >
                </div>
              }

              <div class="row w-100">
                <div class="col p-0">
                  <div class="mb-3 w-100 p-0 mb-3">
                    <label class="form-label" position="stacked">Imágen</label>
                    <input #inputFile
                      type="file"
                      (change)="imageUpload($event.target)"
                      >
                    @if (loadedImg) {
                      <button class="btn btn-link" (click)="deleteImg(inputFile)">
                        <i class="bi bi-x-lg"></i>
                      </button>
                    }
                    <div>
                      <div class="row justify-content-center">

                        <img [src]="img_url" alt=""
                          (load)="loadImg($event)"
                          (error)="loadedImg = false"
                          >
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              @if (parrafo != undefined && parrafo.id != 1) {
                <div class="mb-3 w-100">
                  <label class="form-label" position="floating">Contenido</label>
                  <textarea class="form-control"
                    autocapitalize="sentences"
                    [(ngModel)]="parrafo.content"
                    [rows]="responsiveService.isDesktop ? 6 : 4"
                  ></textarea>
                </div>
              }

              <div class="row justify-content-end mt-3">
                <div class="col-12">
                  <div class="row justify-content-end">
                    <div
                      class="col-12 col-sm-3 align-self-center"
                      >
                      <app-btn-post
                        [posting]="posting"
                        (post)="postParrafo()"
                        [disabled]="!datosCargados()"
                      ></app-btn-post>
                    </div>

                    <div
                      class="col-12 col-sm-3 align-self-center"
                      >
                      <button class="btn btn-outline-secondary w-100" (click)="modalController.dismiss()">
                        Cancelar
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
