<ion-row class="ion-margin-top ion-margin-bottom ion-text-center main-row">
  <ion-col>
    <ion-row class="ion-justify-content-center" >
      <ion-col size="10">
        <ion-row>
          <ion-col><h2>Comisión Directiva</h2></ion-col>
        </ion-row>

        <ion-row >
          <ion-col size="12">
            <app-slides [options]="slideOptions" #slideWithNav>
              <div #slide class="app-slide" *ngFor="let s of sliderOne.slidesItems">
                <div class="app-slide-card">
                  <ion-row class="w-100">
                    <ion-col>
                        <app-usuario-img [src]="s.img_url != null ? configService.imageUrl(s.img_url) : '' "></app-usuario-img>
                    </ion-col>
                  </ion-row>
                  <ion-row class="ion-text-center" >
                    <ion-col>

                      <ion-label>
                        <ion-text title="Nombre">
                          <b>{{s.name}} {{s.last_name}}</b>
                        </ion-text>
                      </ion-label>
                      <ion-card-subtitle title="Rol"
                        >{{s.executive_rol}}</ion-card-subtitle
                      >
                    </ion-col>
                  </ion-row>
                </div>
              </div>
            </app-slides>
            </ion-col
          >

          <a *ngIf="slideOptions.slidesPerViewDesktop && responsiveService.isDesktop" (click)="swipePrev()"> <div class="swiper-button-prev" ></div> </a>
          <a *ngIf="slideOptions.slidesPerViewDesktop && responsiveService.isDesktop" (click)="swipeNext()"><div class="swiper-button-next" ></div></a>
          
        </ion-row>
      </ion-col>
    </ion-row>
  </ion-col>
  
</ion-row>
