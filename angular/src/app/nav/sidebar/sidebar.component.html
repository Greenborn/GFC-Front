<div class="offcanvas offcanvas-end" [class.show]="open" tabindex="-1">
  <div class="offcanvas-header border-bottom">
    <h5 class="offcanvas-title">Menú</h5>
    <button type="button" class="btn-close" (click)="closeSidebar.emit()"></button>
  </div>
  <div class="offcanvas-body p-0">
    <ng-container *ngIf="(auth.user | async) as u">
      <div class="user-section p-3 border-bottom text-center">
        <div class="mb-2">
          <app-usuario-img [src]="u.profile?.img_url ? config.imageUrl(u.profile.img_url) : ''"></app-usuario-img>
        </div>
        <div class="fw-semibold">{{ u.username }}</div>
        <div class="text-muted small">{{ u.profile?.name }} {{ u.profile?.last_name }}</div>
      </div>

      <ul class="list-group list-group-flush">
        <li class="list-group-item list-group-item-action clickeable" [routerLink]="['/concursos/ranking']">
          <i class="bi bi-trophy me-2"></i>Ranking
        </li>
        <li class="list-group-item list-group-item-action clickeable" [routerLink]="['/concursos']">
          <i class="bi bi-images me-2"></i>Concursos
        </li>
        <li class="list-group-item list-group-item-action clickeable" *ngIf="rolificador.esDelegado(u)" [routerLink]="['/usuarios']">
          <i class="bi bi-people me-2"></i>{{ rolificador.getNombreUsuarios(u.role_id) }}
        </li>
        <li class="list-group-item list-group-item-action clickeable" *ngIf="rolificador.isAdmin(u)" [routerLink]="['/organizaciones']">
          <i class="bi bi-building me-2"></i>Organizaciones
        </li>
        <li class="list-group-item list-group-item-action clickeable" *ngIf="rolificador.isAdmin(u) || rolificador.esDelegado(u)" [routerLink]="['/herramientas']">
          <i class="bi bi-tools me-2"></i>Herramientas
        </li>
      </ul>

      <div class="border-top mt-auto">
        <ul class="list-group list-group-flush">
          <li class="list-group-item list-group-item-action clickeable" [routerLink]="['/usuarios', 'editar', u.id]">
            <i class="bi bi-person me-2"></i>Editar perfil
          </li>
          <li class="list-group-item clickeable" (click)="toggleDarkMode()">
            <div class="d-flex align-items-center justify-content-between">
              <span><i class="bi bi-moon me-2"></i>Modo oscuro</span>
              <div class="form-check form-switch mb-0">
                <input type="checkbox" class="form-check-input" [checked]="darkMode" (click)="$event.stopPropagation()">
              </div>
            </div>
          </li>
          <li class="list-group-item list-group-item-action clickeable text-danger" (click)="auth.logout()">
            <i class="bi bi-box-arrow-right me-2"></i>Salir
          </li>
        </ul>
      </div>
    </ng-container>
  </div>
</div>

<div class="offcanvas-backdrop fade" [class.show]="open" (click)="closeSidebar.emit()"></div>
