<ion-content [ngClass]="{'dark': responsiveService.darkMode}">
  <ion-grid>
    <ion-col>
      <ion-row class="ion-justify-content-center">
        <ion-col size="12" size-md="4">
          <ion-row class="ion-justify-content-center margin-top">
            <ion-img
              class="logoEntrada"
              src="../../assets/portadaGFC.png"
            ></ion-img>
          </ion-row>

          <ion-row>
            <ion-card class="ion-margin-top expand-full no-border">
              <div class="expand-full ion-padding-start ion-padding-end" class="ion-margin">
                <ion-item class="expand-full">
                    <ion-row>
                        <ion-col class="ion-no-padding ion-margin-top" size="12">
                            <ion-label>Usuario</ion-label> 
                        </ion-col>
                        <ion-col class="ion-no-padding" size="12">
                            <ion-input
                                class="text-right"
                                (keypress)="keyPress($event)"
                                [(ngModel)]="login.username"
                                ngDefaultControl></ion-input>
                        </ion-col>
                    </ion-row>
                </ion-item>

                <ion-item class="expand-full">
                  <ion-col class="ion-no-padding">
                    <ion-row>
                        <ion-col class="ion-no-padding ion-margin-top" size="12">
                            <ion-label class="w-100">
                                Contraseña <!--<a href="#/login" (click)="recordarPass()" class="ion-float-right">Olvidé mi contraseña</a>-->
                            </ion-label> 
                        </ion-col>
                      <ion-col class="ion-no-padding" size="11">
                            
                        <ion-input
                          #passInput
                          tabindex="0"
                          id="ctr-1"
                          type="password"
                          class="text-right"
                          (keypress)="keyPress($event, 'next')"
                          [(ngModel)]="login.password"
                          ngDefaultControl
                        ></ion-input>
                      </ion-col>
                      <ion-col
                        class="ion-no-padding ion-align-self-center"
                        size="1"
                      >
                        <ion-row>
                          <app-ojo inputId="ctr-1"></app-ojo>
                        </ion-row>
                      </ion-col>
                    </ion-row>
                  </ion-col>
                </ion-item>

                <ion-item class="expand-full">
                  <!-- Enlace de recuperación de contraseña -->
                      <a href="/#/recuperar-password" class="enlace-recuperar-pass">¿Olvidaste tu contraseña?</a>
                </ion-item>
              </div>
              <ion-button
                color="primary"
                expand="block"
                class="ion-margin"
                (click)="next()"
              >
                <ion-label *ngIf="!loading; else spinner">Ingresar</ion-label>
                <ng-template #spinner>
                  <ion-row class="ion-justify-content-center">
                    <ion-spinner></ion-spinner>
                  </ion-row>
                </ng-template>
              </ion-button>

              <ion-item color="danger" *ngIf="error != undefined">
                <ion-label>{{ error }}</ion-label>
              </ion-item>

              <ion-row class="ion-justify-content-center ion-padding-top">
                <ion-col size="12" class="ion-text-center">
                  <ion-text class="ion-padding">o</ion-text>
                </ion-col>
              </ion-row>

              <ion-button expand="block" fill="outline" (click)="loginWithGoogle()" class="ion-margin">
                <ion-icon slot="start" name="logo-google"></ion-icon>
                Ingresar con Google
              </ion-button>
            </ion-card>
          </ion-row>
        </ion-col>
      </ion-row>
    </ion-col>
  </ion-grid>
</ion-content>
