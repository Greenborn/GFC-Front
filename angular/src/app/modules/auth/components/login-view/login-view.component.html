<div class="container-fluid py-3">
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12 col-md-4">
        <div class="logo-container">
          <img
            class="logoEntrada"
            src="../../assets/portadaGFC.png"
            >
        </div>

        <div class="google-btn-wrapper">
          <button class="btn btn-outline-primary google-btn" (click)="loginWithGoogle()">
            <i class="bi bi-google me-1"></i>
            Ingresar con Google
          </button>
        </div>

        <div class="separator">
          <span class="separator-line"></span>
          <span class="separator-text">o</span>
          <span class="separator-line"></span>
        </div>

        <div class="accordion-item">
          <div class="accordion-header">
            <button class="accordion-button" [class.collapsed]="!credentialsOpen" type="button" (click)="credentialsOpen = !credentialsOpen">
              <i class="bi me-2" [ngClass]="credentialsOpen ? 'bi-chevron-down' : 'bi-chevron-up'"></i>
              Usuario y Contraseña
            </button>
          </div>
          <div class="accordion-collapse collapse" [class.show]="credentialsOpen">
            <div class="accordion-body">
              <div class="credential-fields">
                <div class="mb-3 expand-full input-bordered">
                  <label class="form-label">Usuario</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input class="form-control"
                      type="text"
                      placeholder="Ingresá tu usuario"
                      autocomplete="username"
                      (keypress)="keyPress($event)"
                      [(ngModel)]="login.username"
                      >
                  </div>
                </div>

                <div class="mb-3 expand-full input-bordered">
                  <label class="form-label">Contraseña</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input class="form-control"
                      #passInput
                      id="ctr-1"
                      type="password"
                      placeholder="Ingresá tu contraseña"
                      autocomplete="current-password"
                      (keypress)="keyPress($event, 'next')"
                      [(ngModel)]="login.password"
                      >
                    <app-ojo inputId="ctr-1"></app-ojo>
                  </div>
                </div>

                @if (error != undefined) {
                  <div class="mb-3 text-danger p-0">
                    <label class="form-label">{{ error }}</label>
                  </div>
                }

                <button class="btn btn-primary w-100 mt-3 d-flex align-items-center justify-content-center gap-2" (click)="next()" [disabled]="loading">
                  @if (!loading) {
                    <i class="bi bi-box-arrow-in-right"></i>
                    <span>Ingresar</span>
                  } @else {
                    <span class="spinner-border spinner-border-sm" role="status"></span>
                    <span>Cargando...</span>
                  }
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
