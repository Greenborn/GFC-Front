<div class="container-fluid py-3">
  <a href="#main-content" class="visually-hidden-focusable">Saltar al contenido principal</a>
  <div class="container-fluid">
    <div class="row justify-content-center" id="main-content">
      <div class="col-12 col-md-4">
        <div class="logo-container">
          <img class="logoEntrada" src="../../assets/portadaGFC.png" alt="Logo GFC">
        </div>

        <div class="google-btn-wrapper">
          <button class="google-btn" aria-label="Iniciar sesión con Google" (click)="loginWithGoogle()">
            <i class="bi bi-google me-1" aria-hidden="true"></i>
            Ingresar con Google
          </button>
        </div>

        <div class="separator" role="separator" aria-orientation="horizontal">
          <span class="separator-line"></span>
          <span class="separator-text">o</span>
          <span class="separator-line"></span>
        </div>

        <div class="accordion-item">
          <div class="accordion-header">
            <button class="accordion-button" [class.collapsed]="!credentialsOpen" type="button"
              (click)="credentialsOpen = !credentialsOpen"
              [attr.aria-expanded]="credentialsOpen"
              aria-controls="credentials-panel">
              <i class="bi me-2" [ngClass]="credentialsOpen ? 'bi-chevron-down' : 'bi-chevron-up'" aria-hidden="true"></i>
              Usuario y Contraseña
            </button>
          </div>
          <div class="accordion-collapse collapse" [class.show]="credentialsOpen" id="credentials-panel">
            <div class="accordion-body">
              <form (ngSubmit)="next()">
                <div class="credential-fields">
                  <div class="mb-3 expand-full input-bordered">
                    <label class="form-label" for="username-input">Usuario</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-person" aria-hidden="true"></i></span>
                      <input class="form-control" id="username-input" type="text" placeholder="Ingresá tu usuario"
                        autocomplete="username" (keydown.enter)="$event.preventDefault(); passInput.focus()"
                        [(ngModel)]="login.username" name="username">
                    </div>
                  </div>

                  <div class="mb-3 expand-full input-bordered">
                    <label class="form-label" for="ctr-1">Contraseña</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-lock" aria-hidden="true"></i></span>
                      <input class="form-control" #passInput id="ctr-1" type="password" placeholder="Ingresá tu contraseña"
                        autocomplete="current-password" [(ngModel)]="login.password" name="password">
                      <app-ojo inputId="ctr-1"></app-ojo>
                    </div>
                  </div>

                  @if (error != undefined) {
                    <div class="mb-3 text-danger p-0" aria-live="assertive">
                      <label class="form-label">{{ error }}</label>
                    </div>
                  }

                  <button type="submit" class="btn btn-primary w-100 mt-3 d-flex align-items-center justify-content-center gap-2" [disabled]="loading">
                    @if (!loading) {
                      <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>
                      <span>Ingresar</span>
                    } @else {
                      <span class="spinner-border spinner-border-sm" role="status" aria-live="polite"></span>
                      <span>Cargando...</span>
                    }
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
