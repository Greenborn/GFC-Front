<div class="container-fluid py-3">
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12 col-md-4">
        <div class="logo-container">
          <img
            class="logoEntrada"
            src="../../assets/portadaGFC.png"
          >
        </div>

        <div class="google-btn-wrapper">
          <button class="btn btn-outline-primary google-btn" (click)="loginWithGoogle()">
            <i class="bi bi-google me-1"></i>
            Ingresar con Google
          </button>
        </div>

        <div class="separator">
          <span class="separator-line"></span>
          <span class="separator-text">o</span>
          <span class="separator-line"></span>
        </div>

        <div class="accordion" id="loginAccordion">
          <div class="accordion-item">
            <div class="accordion-header">
              <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseCredentials">
                Usuario y Contraseña
              </button>
            </div>
            <div id="collapseCredentials" class="accordion-collapse collapse" data-bs-parent="#loginAccordion">
              <div class="accordion-body">
                <div class="credential-fields">
                  <div class="mb-3 expand-full input-bordered">
                    <label class="form-label">Usuario</label>
                    <input class="form-control"
                      placeholder="Ingresá tu usuario"
                      (keypress)="keyPress($event)"
                      [(ngModel)]="login.username"
                    >
                  </div>

                  <div class="mb-3 expand-full input-bordered">
                    <label class="form-label">Contraseña</label>
                    <input class="form-control"
                      #passInput
                      id="ctr-1"
                      type="password"
                      placeholder="Ingresá tu contraseña"
                      (keypress)="keyPress($event, 'next')"
                      [(ngModel)]="login.password"
                    >
                    <app-ojo inputId="ctr-1"></app-ojo>
                  </div>
                </div>

                <div class="mb-3 expand-full">
                  <a href="/#/recuperar-password" class="enlace-recuperar-pass">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="mb-3 text-danger" *ngIf="error != undefined" class="p-0">
                  <label class="form-label">{{ error }}</label>
                </div>

                <button class="btn btn-primary w-100 mt-3" (click)="next()">
                  <label class="form-label" *ngIf="!loading; else spinner">Ingresar</label>
                  <ng-template #spinner>
                    <div class="row justify-content-center">
                      <div class="spinner-border spinner-border-sm text-primary" role="status"><span class="visually-hidden">Loading...</span></div>
                    </div>
                  </ng-template>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
