<ion-content>
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12 col-md-4">
        <ion-card class="mt-3 expand-full no-border">
          <div class="expand-full ps-3 pe-3">
            <h2>Recuperar contraseña</h2>
            <ion-item>
              <ion-label position="floating">Código recibido</ion-label>
              <ion-input type="text" required [(ngModel)]="code" name="code" ngDefaultControl></ion-input>
            </ion-item>
            <ion-item>
              <ion-label position="floating">Nueva contraseña</ion-label>
              <ion-input type="password" required [(ngModel)]="pass_0" name="pass_0" ngDefaultControl></ion-input>
            </ion-item>
            <ion-item>
              <ion-label position="floating">Repetir contraseña</ion-label>
              <ion-input type="password" required [(ngModel)]="pass_1" name="pass_1" ngDefaultControl></ion-input>
            </ion-item>
            <ion-button expand="block" color="primary" class="mt-3" [disabled]="loadingCambio || !code || !pass_0 || !pass_1" (click)="cambiarPassword()">
              <ion-label *ngIf="!loadingCambio">Cambiar contraseña</ion-label>
              <ion-spinner *ngIf="loadingCambio" name="dots"></ion-spinner>
            </ion-button>
            <ion-item color="danger" *ngIf="errorCambio">
              <ion-label>{{ errorCambio }}</ion-label>
            </ion-item>
          </div>
        </ion-card>
      </div>
    </div>
  </div>
</ion-content>
