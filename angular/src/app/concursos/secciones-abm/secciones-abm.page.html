<div class="bg-light border-bottom p-3">
  <div class="container-fluid">
    <div class="row">
      <div class="d-flex gap-1">
        <button class="btn btn-dark btn-sm" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid py-3">
  <div class="container-fluid p-0 m-0">
    <div class="row justify-content-center">
      <div class="col-3" *ngIf="mostrarFiltro">
        <div class="row">
          <div class="col">
            <h5 class="mt-3">Búsqueda</h5>

            <app-search-bar
              [(data)]="sections"
              [atributosObj]="atributosBusqueda"
            ></app-search-bar>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="row">
          <div class="col-12">
            <div class="row justify-content-start align-items-center mt-3 mb-3">
              <h1 class="mt-3 mb-3 me-3">
                Secciones
              </h1>
              <button class="btn btn-success rounded-circle d-flex align-items-center justify-content-center" style="width:36px;height:36px" (click)="postSection()">
                <i class="bi bi-plus"></i>
              </button>
            </div>
            <div class="list-group list-group-flush" class="p-0">
              <div class="mb-3" bg-dark text-white>
                <div class="container-fluid">
                  <div class="row pe-3">
                    <div class="col">
                      <div class="row">
                        <app-th-sort
                          [sortFn]="ordenarPorNombre"
                          [(data)]="sections"
                          title="Nombre"
                        ></app-th-sort>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="list-group list-group-flush" class="p-0">
              <div class="mb-3" class="p-0 lista-elem">
                <div class="container-fluid p-0" *ngIf="sections.length > 0; else texto">
                  <div class="container-fluid p-0">
                    <div class="row">
                      <div class="col align-self-start">
                        <div *ngFor="let s of sections">
                          <div class="list-group-item border-top fw-bold bg-light" style="--inner-padding-end: 16px">
                            <div class="row w-100">
                              <div class="col">
                                <h4 class="mt-3 mb-3"> <b>{{ s.name }}</b></h4>
                              </div>
                              <div class="col-1 col-md-2 align-self-center">
                                <div class="d-flex gap-1 justify-content-end">
                                  <div class="d-none d-md-block">
                                    <button class="btn btn-warning" title="Editar sección" (click)="postSection(s)">
                                      <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-danger" title="Eliminar sección" (click)="deleteSection(s)">
                                      <i class="bi bi-trash"></i>
                                    </button>
                                  </div>
                                  <div class="d-md-none">
                                    <button class="btn btn-outline-dark" (click)="mostrarAcciones($event, s)">
                                      <i class="bi bi-three-dots-vertical"></i>
                                    </button>
                                  </div>
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                <ng-template #texto>No hay secciones</ng-template>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
