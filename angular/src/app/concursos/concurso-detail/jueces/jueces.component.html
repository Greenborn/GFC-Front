<ion-content 
  >
  <!-- *ngIf="auth.user | async as userLogged"> -->
  <ion-grid #concursantesContent id="concursantesContent"
    class="ion-no-padding ion-no-margin"
  >
    <ion-row class="ion-justify-content-center">
      <!-- filtro -->
      <ion-col size="12" size-md="3" *ngIf="mostrarFiltro">
        <ion-col>
          <ion-title class="ion-margin-top">Búsqueda</ion-title>
  
          <app-search-bar
            [(data)]="inscriptos"
            [atributosObj]="atributosBusqueda"
          ></app-search-bar>
  
  
        </ion-col>
      </ion-col>
  
      <ion-col>
        <ion-row *ngIf="(auth.user | async) as u">
          <ion-col size="11.5" push="0.25">
            <ion-row
              class="
                ion-justify-content-start
                ion-align-items-center
                ion-margin-top
                ion-margin-bottom
              "
            >
              <h1 class="ion-margin-top ion-margin-bottom ion-margin-end">
                Jurado
              </h1>
                <!-- TODO: hacer priv el rolific-->
              
              <ion-fab-button
                size="small"
                *ngIf="contestService.isActive(concurso) && (rolificador.esDelegado(u) || rolificador.isAdmin(u)) "
                (click)="inscribirJuez()">
                
                <ion-icon name="add"></ion-icon>
              </ion-fab-button>
              
            </ion-row>
  
            <ion-row class="ion-align-items-center ion-padding-bottom">
              <ion-col size="10" size-sm="11">
                
              </ion-col>
              <ion-col size="2" size-sm="1">
                <ion-row
                  class="
                    ion-justify-content-center
                    ion-align-items-center
                    ion-align-self-center
                  "
                >
                  <ion-button
                    (click)="mostrarFiltro = !mostrarFiltro"
                    color="medium"
                    expand="block"
                    class="
                      ion-justify-content-center
                      ion-align-items-center
                      ion-align-self-center
                    "
                  >
                    <ion-icon name="funnel"></ion-icon>
                    <!-- <ion-icon name="options"></ion-icon> -->
                  </ion-button>
                </ion-row>
              </ion-col>
            </ion-row>
            <ion-grid class="ion-no-padding">
              <ion-row *ngIf="inscriptos.length > 0; else texto">
                <ion-col size="12" size-sm="6" size-md="4" size-lg="3" *ngFor="let m of inscriptos">
                  <ion-card class="juez-card">
                    <ion-card-content>
                      <ion-row class="ion-align-items-center">
                        <ion-col size="4">
                          <app-usuario-img [src]="m.profile.img_url != null ? configService.imageUrl(m.profile.img_url) : ''"></app-usuario-img>
                        </ion-col>
                        <ion-col size="8" class="ion-padding-start">
                          <ion-label>
                            <b>{{ m.profile.name }} {{ m.profile.last_name }}</b>
                            <p><i>@{{ m.profile.user.username }}</i></p>
                          </ion-label>
                        </ion-col>
                      </ion-row>
                      <ion-row *ngIf="checkPermissions">
                        <ion-col class="ion-text-end">
                          <ion-button fill="clear" color="danger" (click)="concursoDetailService.desinscribir.emit(m)" title="Desinscribir">
                            <ion-icon name="trash"></ion-icon>
                          </ion-button>
                        </ion-col>
                      </ion-row>
                    </ion-card-content>
                  </ion-card>
                </ion-col>
              </ion-row>
              <ng-template #texto>
                <ion-row class="ion-justify-content-center ion-padding">
                  <ion-col size="auto">
                    <p>No hay inscriptos</p>
                  </ion-col>
                </ion-row>
              </ng-template>
            </ion-grid>
            <ng-template #spinner>
              <ion-row class="ion-justify-content-center">
                <ion-spinner></ion-spinner>
              </ion-row>
            </ng-template>
          </ion-col>
        </ion-row>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
