<div class="container-fluid py-3">
  <div class="container-fluid p-0 m-0" #concursantesContent id="concursantesContent">
    <div class="row justify-content-center">
      <div class="col-12 col-md-3" *ngIf="mostrarFiltro">
        <div class="row">
          <div class="col">
            <ion-title class="mt-3">Búsqueda</ion-title>
    
            <app-search-bar
              [(data)]="inscriptos"
              [atributosObj]="atributosBusqueda"
            ></app-search-bar>
    
          </div>
        </div>
      </div>
  
      <div class="col">
        <div class="row" *ngIf="(auth.user | async) as u">
          <div class="col-12">
            <div class="row justify-content-start align-items-center mt-3 mb-3">
              <h1 class="mt-3 mb-3 me-3">
                Jurado
              </h1>
             
              <button class="btn btn-dark rounded-circle d-flex align-items-center justify-content-center"
                style="width:36px;height:36px" size="small"
                *ngIf="contestService.isActive(concurso) && (rolificador.esDelegado(u) || rolificador.isAdmin(u)) "
                (click)="inscribirJuez()">
                
                <i class="bi bi-plus"></i>
              </button>
              
            </div>
  
            <div class="row align-items-center pb-3">
              <div class="col-10 col-sm-11">
                
              </div>
              <div class="col-2 col-sm-1">
                <div class="row justify-content-center align-items-center align-self-center">
                  <button
                    class="btn btn-secondary w-100 justify-content-center align-items-center align-self-center"
                    (click)="mostrarFiltro = !mostrarFiltro"
                  >
                    <i class="bi bi-funnel"></i>
                  </button>
                </div>
              </div>
            </div>
            <div class="container-fluid p-0">
              <div class="row" *ngIf="inscriptos.length > 0; else texto">
                <div class="col-12 col-sm-6 col-md-4 col-lg-3" *ngFor="let m of inscriptos">
                  <ion-card class="juez-card">
                    <ion-card-content>
                      <div class="row align-items-center">
                        <div class="col-4">
                          <app-usuario-img [src]="m.profile.img_url != null ? configService.imageUrl(m.profile.img_url) : ''"></app-usuario-img>
                        </div>
                        <div class="col-8 ps-3">
                          <ion-label>
                            <b>{{ m.profile.name }} {{ m.profile.last_name }}</b>
                            <p><i>@{{ m.profile.user.username }}</i></p>
                          </ion-label>
                        </div>
                      </div>
                      <div class="row" *ngIf="checkPermissions">
                        <div class="col text-end">
                          <button class="btn btn-link" (click)="concursoDetailService.desinscribir.emit(m)" title="Desinscribir">
                            <i class="bi bi-trash"></i>
                          </button>
                        </div>
                      </div>
                    </ion-card-content>
                  </ion-card>
                </div>
              </div>
              <ng-template #texto>
                <div class="row justify-content-center p-3">
                  <div class="col-auto">
                    <p>No hay inscriptos</p>
                  </div>
                </div>
              </ng-template>
            </div>
            <ng-template #spinner>
              <div class="row justify-content-center">
                <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>
              </div>
            </ng-template>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
