<div [ngClass]="responsiveService.isDesktop ? 'ion-page' : ''">
  <div class="bg-light border-bottom p-3">
    <div class="row align-items-center ms-3 me-3">
      <div class="col">
        <h5 class="mb-0">
          {{ formTitle }}
        </h5>
      </div>
      <div class="col-1 d-none d-md-block">
        <button class="btn btn-link" (click)="modalController.dismiss()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
    </div>
  </div>

  <div slot="start" class="w-100 inner-content float-md-start">
    <div class="container-fluid">

      <div class="row">
        <ion-item class="w-100 mb-3">
          <ion-label position="floating">Nombre</ion-label>
          <ion-input name="name" ngDefaultControl [(ngModel)]="grabacion.object" autocapitalize="sentences" required></ion-input>
        </ion-item>
      </div>

      <div class="row">
        <ion-item class="w-100 mb-3">
          <ion-label position="floating">URL</ion-label>
          <ion-input name="name" ngDefaultControl [(ngModel)]="grabacion.url" autocapitalize="sentences" required></ion-input>
        </ion-item>
      </div>

      <div class="row">
        <div class="col"></div>
        <div class="col-auto">
          <button class="btn btn-link w-100" (click)="modalController.dismiss()">Cancelar</button>
        </div>
        <div class="col-auto">
          <button class="btn btn-outline-primary" (click)="guardar()">Guardar</button>
        </div>
        <div class="col"></div>
      </div>
      
    </div>
  </div>
</div>
