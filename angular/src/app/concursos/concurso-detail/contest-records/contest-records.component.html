<div class="col">
  <div class="row">
    <h2 class="mt-3 mb-3 me-3">
        Grabaciones
    </h2>
    <button class="btn btn-success btn-sm rounded-circle" (click)="addGrabacion()">
        <i class="bi bi-plus"></i>
    </button>
  </div>

  <div class="row">
      <div class="list-group list-group-flush w-100">

        <div class="mb-3" *ngFor="let grabacion of concurso.contestRecords">
            <div class="container-fluid">
              <div class="row">
                <div class="col"><a href="{{grabacion.url}}" target="_blank">{{grabacion.object}}</a></div>
                <div class="col-auto">
                  <div class="d-flex gap-1">
                    <button class="btn btn-warning" (click)="editarGrabacion(grabacion)">
                      <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-danger" (click)="eliminarGrabacion(grabacion)">
                      <i class="bi bi-trash"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
        </div>

        
      </div>
  </div>
</div>
