<div class="bg-light border-bottom p-3 d-flex align-items-center gap-2">
  <button class="btn btn-outline-primary" (click)="dismiss()">
    <i class="bi bi-arrow-left"></i>
  </button>
  <h5 class="mb-0">Filtros y orden</h5>
</div>

<div class="container-fluid py-3 ion-padding">
  <ion-list>
    <ion-list-header>
      <ion-label>Ordenar por</ion-label>
      <button *ngIf="hasSort" (click)="toggleSortDir()" class="btn btn-link btn-sm">
        <i class="bi me-1" [ngClass]="localSortAsc ? 'bi-arrow-up' : 'bi-arrow-down'"></i>
        {{ localSortAsc ? 'Asc' : 'Desc' }}
      </button>
    </ion-list-header>
    <ion-radio-group [value]="localSortBy" (ionChange)="onSortChange($event)">
      <ion-item lines="none">
        <ion-label>Sin ordenar</ion-label>
        <ion-radio value=""></ion-radio>
      </ion-item>
      <ion-item lines="none">
        <ion-label>Título</ion-label>
        <ion-radio value="title"></ion-radio>
      </ion-item>
      <ion-item lines="none" *ngIf="canFilterByAuthor">
        <ion-label>Autor</ion-label>
        <ion-radio value="author"></ion-radio>
      </ion-item>
      <ion-item lines="none" [disabled]="!isContestJudged">
        <ion-label>Premio</ion-label>
        <ion-radio value="prize"></ion-radio>
      </ion-item>
    </ion-radio-group>
  </ion-list>

  <ion-list>
    <ion-list-header>Secciones</ion-list-header>
    <ion-chip (click)="seccionAll()" [color]="todasSecciones ? 'primary' : 'medium'">
      <ion-label>Todas</ion-label>
    </ion-chip>
    <ion-chip *ngFor="let s of seccionesInscriptas"
      (click)="toggleSeccion(s.section.id)"
      [color]="localSecciones.has(s.section.id) ? 'primary' : 'medium'">
      <ion-label>{{ s.section.name }}</ion-label>
    </ion-chip>
  </ion-list>

  <ion-list>
    <ion-list-header>Categorías</ion-list-header>
    <ion-chip (click)="categoriaAll()" [color]="todasCategorias ? 'primary' : 'medium'">
      <ion-label>Todos</ion-label>
    </ion-chip>
    <ion-chip *ngFor="let c of categoriasInscriptas"
      (click)="toggleCategoria(c.category.id)"
      [color]="localCategorias.has(c.category.id) ? 'primary' : 'medium'">
      <ion-label>{{ c.category.name }}</ion-label>
    </ion-chip>
  </ion-list>

  <ion-list *ngIf="isContestJudged">
    <ion-list-header>Premios</ion-list-header>
    <ion-chip (click)="premioAll()" [color]="todosPremios ? 'primary' : 'medium'">
      <ion-label>Todos</ion-label>
    </ion-chip>
    <ion-chip *ngFor="let p of puntajes"
      (click)="togglePremio(p.prize)"
      [color]="localPremios.has(p.prize) ? 'primary' : 'medium'">
      <ion-label>{{ p.prize }}</ion-label>
    </ion-chip>
  </ion-list>

  <ion-list *ngIf="canFilterByAuthor">
    <ion-list-header>Filtrar por autor</ion-list-header>
    <ion-item>
      <ion-input [(ngModel)]="localFiltroAutor" placeholder="Nombre del autor"></ion-input>
    </ion-item>
  </ion-list>

  <ion-list *ngIf="isContestJudged">
    <ion-list-header>Filtrar por código</ion-list-header>
    <ion-item>
      <ion-input [(ngModel)]="localFiltroCodigo" placeholder="Código de fotografía"></ion-input>
    </ion-item>
  </ion-list>

  <button class="btn btn-danger w-100 ion-margin" (click)="resetAll()">
    <i class="bi bi-x-circle me-1"></i>
    Limpiar filtros
  </button>
</div>
