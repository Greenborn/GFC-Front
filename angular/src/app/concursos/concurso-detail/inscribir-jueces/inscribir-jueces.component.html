<div [ngClass]="responsiveService.isDesktop ? 'gfc-modal-page' : ''">
  <div class="gfc-modal-header">
    <div class="row align-items-center ms-3 me-3">
      <div class="col">
        <h5 class="mb-0">
          Inscribir Juez a {{ contest.name }}
        </h5>
      </div>
      <div class="col-1 d-none d-md-block">
        <button class="btn btn-link" (click)="modalController.dismiss()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="w-100 inner-content float-md-start">
    <div class="container-fluid">
      <div class="row justify-content-center align-self-center">
        <div class="col">
          <div class="row">
            <div class="col">
              <div class="row pt-3">
                <div class="mb-3" class="w-100 mb-3">
                  <label class="form-label">Juez</label>
                  <select class="form-select" [(ngModel)]="profileContest.profile_id">
                    <option
                      *ngFor="let p of jueces"
                      [value]="p.id"
                      >{{ p.name + " " + p.last_name }}</option>
                  </select>
                </div>
              </div>

              <div class="row justify-content-end">
                <div class="col-12">
                  <div class="row justify-content-end">
                    <div class="col-12 col-sm-3 align-self-center">
                      <app-btn-post
                        [posting]="posting"
                        (post)="inscribirJuez()"
                        [disabled]="!datosCargados()"
                      ></app-btn-post>
                    </div>

                    <div class="col-12 col-sm-3 align-self-center">
                      <button
                        class="btn btn-link w-100"
                        (click)="modalController.dismiss()"
                      >
                        Cancelar</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
