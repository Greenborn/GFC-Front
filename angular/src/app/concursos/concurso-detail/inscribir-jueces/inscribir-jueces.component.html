<div [ngClass]="responsiveService.isDesktop ? 'ion-page' : ''">
  <ion-header>
    <ion-toolbar>
      <div class="row align-items-center ms-3 me-3">
        <div class="col">
          <h5 class="ion-text-wrap">
            Inscribir Juez a {{ contest.name }}
          </h5>
        </div>
        <div class="col-1 d-none d-md-block">
          <ion-button (click)="modalController.dismiss()" fill="clear" class="">
            <ion-icon name="close-outline"></ion-icon>
          </ion-button>
        </div>
      </div>
    </ion-toolbar>
  </ion-header>

  <div slot="start" class="w-100 inner-content float-md-start">
    <div class="container-fluid">
      <div class="row justify-content-center align-self-center">
        <div class="col">
          <div class="row">
            <div class="col">
              <div class="row pt-3">
                <ion-item class="w-100 mb-3">
                  <ion-label position="floating">Juez</ion-label>
                  <ion-select [(ngModel)]="profileContest.profile_id" okText="Aceptar" cancelText="Cancelar" ngDefaultControl>
                    <ion-select-option
                      *ngFor="let p of jueces"
                      [value]="p.id"
                      >{{ p.name + " " + p.last_name }}</ion-select-option
                    >
                  </ion-select>
                </ion-item>
              </div>

              <div class="row justify-content-end">
                <div class="col-12">
                  <div class="row justify-content-end">
                    <div class="col-12 col-sm-3 align-self-center">
                      <app-btn-post
                        [posting]="posting"
                        (post)="inscribirJuez()"
                        [disabled]="!datosCargados()"
                      ></app-btn-post>
                    </div>

                    <div class="col-12 col-sm-3 align-self-center">
                      <ion-button
                        expand="block"
                        (click)="modalController.dismiss()"
                        fill="clear"
                      >
                        Cancelar</ion-button
                      >
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
