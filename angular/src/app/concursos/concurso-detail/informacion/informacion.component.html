<div class="row" *ngIf="auth.user | async as u">
  <div class="col info-col">
    
    <ion-card class="ion-no-margin info-card">
      
      <ion-card-header class="ion-no-padding info-header">
        <div class="info-header-main">
          <ion-card-title class="info-title">{{ concurso.name }}</ion-card-title>
          <ion-card-subtitle>
            Desde: {{ fechaInicio | date: "dd/MM/yyyy HH:mm" }} - Hasta:
            {{ fechaFin | date: "dd/MM/yyyy HH:mm" }}
          </ion-card-subtitle>
        </div>

        <div *ngIf="(rolificador.esDelegado(u) || rolificador.isAdmin(u))" class="info-admin-col">
          <button class="btn btn-outline-primary btn-sm" (click)="deleteConcurso()">
            <ion-icon name="trash"></ion-icon>
          </button>
          <button class="btn btn-outline-primary btn-sm" [routerLink]="['/concursos/editar/' + concurso.id]">
            <ion-icon name="create"></ion-icon>
          </button>
        </div>
      </ion-card-header>
      
      <ion-card-content class="ion-no-padding">
        <div class="info-body">
          <ion-text class="info-desc">{{ concurso.description }}</ion-text>

          <div class="info-actions">
            <button class="btn btn-outline-primary btn-sm" *ngIf="isContestNotFin && !isInscripto" (click)="inscribirConcursante()">
              Inscribirme!
            </button>
            <button class="btn btn-danger btn-sm" *ngIf="isContestNotFin && isInscripto" (click)="desinscribirme()">
              Desinscribirme!
            </button>
            <button class="btn btn-outline-primary btn-sm" [routerLink]="['/concursos', concurso.id, 'fotografias']">
              <ion-icon name="images-outline"></ion-icon>
              Ver Fotografías
            </button>
            <button class="btn btn-outline-primary btn-sm" (click)="descargarFotografias()">
              Descargar Fotografías
            </button>
            <button class="btn btn-outline-primary btn-sm" (click)="compartir()">
              <ion-icon name="share-social-outline"></ion-icon>
            </button>
          </div>

          <div class="info-rule-row">
            <b>Reglamento</b>
            <button class="btn btn-outline-primary btn-sm" (click)="openRules()">
              <ion-icon name="link-outline"></ion-icon>
            </button>
          </div>

          <div class="info-tags-row">
            <b>Categorias:</b>
            <div class="info-tags">
              <ion-badge color="light" *ngFor="let c of categoriasInscriptasAsc">
                {{ c.category.name }}
              </ion-badge>
            </div>
          </div>

          <div class="info-tags-row">
            <b>Secciones:</b>
            <div class="info-tags">
              <ion-badge color="light" *ngFor="let s of seccionesInscriptasAsc">
                {{ s.section.name }}
              </ion-badge>
            </div>
          </div>

          <div class="info-tags-row" *ngIf="concurso.contestRecords?.length">
            <b>Grabaciones:</b>
            <div class="info-tags">
              <ion-badge color="light" *ngFor="let s of concurso.contestRecords">
                <a href="{{s.url}}" target="_blank">{{ s.object }}</a>
              </ion-badge>
            </div>
          </div>
        </div>
      </ion-card-content>

    </ion-card>
    
  </div>
</div>
