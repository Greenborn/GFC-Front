<div class="py-3" *ngIf="auth.user | async as u">
  <div class="row">
    <div class="col info-col">
    
    <div class="card mb-3 m-0 info-card">
      
      <div class="card-header p-0 info-header">
        <div class="info-header-main">
          <h5 class="card-title info-title">{{ concurso.name }}</h5>
          <h6 class="card-subtitle text-muted">
            Desde: {{ fechaInicio | date: "dd/MM/yyyy HH:mm" }} - Hasta:
            {{ fechaFin | date: "dd/MM/yyyy HH:mm" }}
          </h6>
        </div>

        <div *ngIf="(rolificador.esDelegado(u) || rolificador.isAdmin(u))" class="info-admin-col">
          <button class="btn btn-danger btn-sm" (click)="deleteConcurso()">
            <i class="bi bi-trash"></i>
          </button>
          <button class="btn btn-warning btn-sm" [routerLink]="['/concursos/editar/' + concurso.id]">
            <i class="bi bi-pencil"></i>
          </button>
        </div>
      </div>
      
      <div class="card-body p-0">
        <div class="info-body">
          <span class="info-desc">{{ concurso.description }}</span>

          <div class="info-actions">
            <button class="btn btn-success btn-sm" *ngIf="isContestNotFin && !isInscripto" (click)="inscribirConcursante()">
              Inscribirme!
            </button>
            <button class="btn btn-danger btn-sm" *ngIf="isContestNotFin && isInscripto" (click)="desinscribirme()">
              Desinscribirme!
            </button>
            <button class="btn btn-primary btn-sm" [routerLink]="['/concursos', concurso.id, 'fotografias']">
              <i class="bi bi-images"></i>
              Ver Fotografías
            </button>
            <button class="btn btn-primary btn-sm" (click)="descargarFotografias()">
              Descargar Fotografías
            </button>
            <button class="btn btn-primary btn-sm" (click)="compartir()">
              <i class="bi bi-share"></i>
            </button>
          </div>

          <div class="info-rule-row">
            <b>Reglamento</b>
            <button class="btn btn-primary btn-sm" (click)="openRules()">
              <i class="bi bi-link-45deg"></i>
            </button>
          </div>

          <div class="info-tags-row">
            <b>Categorias:</b>
            <div class="info-tags">
              <span class="badge gfc-badge" *ngFor="let c of categoriasInscriptasAsc">
                {{ c.category.name }}
              </span>
            </div>
          </div>

          <div class="info-tags-row">
            <b>Secciones:</b>
            <div class="info-tags">
              <span class="badge gfc-badge" *ngFor="let s of seccionesInscriptasAsc">
                {{ s.section.name }}
              </span>
            </div>
          </div>

          <div class="info-tags-row" *ngIf="concurso.contestRecords?.length">
            <b>Grabaciones:</b>
            <div class="info-tags">
              <span class="badge gfc-badge" *ngFor="let s of concurso.contestRecords">
                <a href="{{s.url}}" target="_blank">{{ s.object }}</a>
              </span>
            </div>
          </div>
        </div>
      </div>

    </div>
    
    </div>
  </div>
</div>
