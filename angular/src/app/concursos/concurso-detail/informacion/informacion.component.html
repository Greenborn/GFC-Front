<div class="pb-3" *ngIf="auth.user | async as u">

  <div class="info-hero" [style.background-image]="concurso.img_url ? 'url(' + configService.imageUrl(concurso.img_url) + ')' : ''">
    <div class="info-hero-overlay"></div>
    <div class="info-hero-content">
      <span class="info-hero-badge" [class.open]="isContestNotFin">{{ isContestNotFin ? 'Abierto' : 'Finalizado' }}</span>
      <h1 class="info-hero-title">{{ concurso.name }}</h1>
      <p class="info-hero-dates">
        <i class="bi bi-calendar3"></i>
        {{ fechaInicio | date: "dd/MM/yyyy" }} — {{ fechaFin | date: "dd/MM/yyyy" }}
      </p>
    </div>
    <div class="info-hero-admin" *ngIf="rolificador.esDelegado(u) || rolificador.isAdmin(u)">
      <button class="info-hero-btn edit" [routerLink]="['/concursos/editar/' + concurso.id]" title="Editar">
        <i class="bi bi-pencil"></i>
      </button>
      <button class="info-hero-btn delete" (click)="deleteConcurso()" title="Eliminar">
        <i class="bi bi-trash"></i>
      </button>
    </div>
  </div>

  <div class="info-content">

    <div class="info-section info-desc-section" *ngIf="concurso.description">
      <h3 class="info-section-title"><i class="bi bi-info-circle"></i> Descripción</h3>
      <p class="info-desc">{{ concurso.description }}</p>
    </div>

    <div class="info-section info-actions-section">
      <div class="info-actions">
        <button class="info-btn info-btn-primary" *ngIf="isContestNotFin && !isInscripto" (click)="inscribirConcursante()">
          <i class="bi bi-pencil-square"></i> Inscribirme
        </button>
        <button class="info-btn info-btn-danger" *ngIf="isContestNotFin && isInscripto" (click)="desinscribirme()">
          <i class="bi bi-x-circle"></i> Desinscribirme
        </button>
        <button class="info-btn info-btn-outline" [routerLink]="['/concursos', concurso.id, 'fotografias']">
          <i class="bi bi-images"></i> Ver Fotografías
        </button>
        <button class="info-btn info-btn-outline" (click)="descargarFotografias()">
          <i class="bi bi-download"></i> Descargar
        </button>
        <button class="info-btn info-btn-outline" (click)="compartir()">
          <i class="bi bi-share"></i> Compartir
        </button>
      </div>
    </div>

    <div class="info-section" *ngIf="concurso.rules_url">
      <div class="info-row">
        <span class="info-label"><i class="bi bi-file-text"></i> Reglamento</span>
        <button class="info-btn info-btn-sm info-btn-outline" (click)="openRules()">
          <i class="bi bi-box-arrow-up-right"></i> Ver reglamento
        </button>
      </div>
    </div>

    <div class="info-section" *ngIf="categoriasInscriptasAsc.length > 0">
      <h3 class="info-section-title"><i class="bi bi-tags"></i> Categorías</h3>
      <div class="info-tags">
        <span class="info-tag" *ngFor="let c of categoriasInscriptasAsc">{{ c.category.name }}</span>
      </div>
    </div>

    <div class="info-section" *ngIf="seccionesInscriptasAsc.length > 0">
      <h3 class="info-section-title"><i class="bi bi-layers"></i> Secciones</h3>
      <div class="info-tags">
        <span class="info-tag" *ngFor="let s of seccionesInscriptasAsc">{{ s.section.name }}</span>
      </div>
    </div>

    <div class="info-section" *ngIf="concurso.contestRecords?.length">
      <h3 class="info-section-title"><i class="bi bi-camera-video"></i> Grabaciones</h3>
      <div class="info-links">
        <a class="info-link" *ngFor="let s of concurso.contestRecords" [href]="s.url" target="_blank" rel="noopener">
          <i class="bi bi-play-circle"></i> {{ s.object }}
        </a>
      </div>
    </div>

  </div>

</div>
