<div class="container py-3">
  @if (auth.user | async; as u) {
    <div class="row">
      <div class="col">
        <ul class="nav concurso-tabs mb-0">
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['./informacion']" routerLinkActive="active">
              <i class="bi bi-info-circle me-1"></i> Información
            </a>
          </li>
          @if (rolificador.esDelegado(u) || rolificador.isAdmin(u) || concurso?.judged) {
            <li class="nav-item">
              <a class="nav-link" [routerLink]="['./concursantes']" routerLinkActive="active">
                <i class="bi bi-people me-1"></i> Concursantes
              </a>
            </li>
          }
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['./fotografias']" routerLinkActive="active">
              <i class="bi bi-images me-1"></i> Fotografías
            </a>
          </li>
        </ul>
      </div>
    </div>
  }
  <router-outlet></router-outlet>
</div>
