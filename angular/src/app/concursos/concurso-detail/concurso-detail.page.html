<div class="container-fluid py-3" #pageContent id="concurso-content">
  
  <div class="row" id="concurso-tabs" #tabsContent>
      <div class="col">
          <div class="row" *ngIf="(auth.user | async) as u">
              <div>
              <ul class="nav nav-pills mb-3">
                <li class="nav-item"><a class="nav-link" tab="informacion">
                  <i class="bi bi-info-circle"></i>
                  <label class="form-label">Información</label>
                </a></li>
                
                <li class="nav-item"><a class="nav-link" tab="concursantes" *ngIf="rolificador.esDelegado(u) || rolificador.isAdmin(u) || concurso.judged">
                  <i class="bi bi-people"></i>
                  <label class="form-label">Concursantes</label>
                </a></li>
        
                <li class="nav-item"><a class="nav-link" tab="fotografias" (click)="goToFotografias()">
                  <i class="bi bi-images"></i>
                  <label class="form-label">Fotografias</label>
                </a></li>

              </ul>
            </div>
        
          </div>
        </div>
      </div>
</div>
