<ion-content #pageContent id="concurso-content">
  
  <div class="row" id="concurso-tabs" #tabsContent>
      <div class="col">
          <div class="row" *ngIf="(auth.user | async) as u">
              <ion-tabs>
              <ion-tab-bar slot="top">
                <ion-tab-button tab="informacion">
                  <ion-icon name="information-circle-outline"></ion-icon>
                  <ion-label>Información</ion-label>
                </ion-tab-button>
                
                <ion-tab-button tab="concursantes" *ngIf="rolificador.esDelegado(u) || rolificador.isAdmin(u) || concurso.judged">
                  <ion-icon name="people-outline"></ion-icon>
                  <ion-label>Concursantes</ion-label>
                </ion-tab-button>
        
                <ion-tab-button tab="fotografias" (click)="goToFotografias()">
                  <ion-icon name="images-outline"></ion-icon>
                  <ion-label>Fotografias</ion-label>
                </ion-tab-button>

              </ion-tab-bar>
            </ion-tabs>
        
          </div>
        </div>
      </div>
</ion-content>
