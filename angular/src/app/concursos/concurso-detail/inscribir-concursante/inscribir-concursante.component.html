<div [ngClass]="responsiveService.isDesktop ? 'ion-page' : ''">
  <div class="bg-light border-bottom p-3">
    <div class="row align-items-center ms-3 me-3">
      <div class="col">
        <h5 class="mb-0">
          Inscribir concursante a {{ contest.name }}
        </h5>
      </div>
      <div class="col-1 d-none d-md-block">
        <button class="btn btn-link" (click)="modalController.dismiss()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="w-100 inner-content float-md-start">
    <div class="container-fluid">
      <div class="row justify-content-center align-self-center">
        <div class="col">
          <div class="row">
            <div class="col">
              <div class="row pt-3">
                <div class="mb-3" *ngIf="concursantes.length > 1; else unicoElemento" class="w-100 mb-3">
                    <label class="form-label">Concursante</label>
                    <app-searchable-select
                      [(ngModel)]="profileContest.profile_id"
                      [items]="concursantes"
                      itemValueField="id"
                      itemTextField="name"
                      placeholder="Seleccionar concursante"
                    ></app-searchable-select>
                  
                </div>
                <ng-template #unicoElemento>
                
                <div class="mb-3" class="w-100 mb-3">
                <label class="form-label">Concursante</label>
                <input class="form-control" bg-dark text-white
                [(ngModel)]="concursantes[0].name"
                disabled>
                  
                
              </div>
                </ng-template>
              </div>
              <div class="row pt-3">
                <div class="mb-3" class="w-100 mb-3">
                  <label class="form-label">Categoría</label>
                  <select class="form-select" [(ngModel)]="profileContest.category_id">
                    <option
                      *ngFor="let c of categorias"
                      [value]="c.id"
                      >{{ c.name }}</option>
                  </select>
                </div>
              </div>

              <div class="row justify-content-center pt-3">
                <div class="col-auto">
                  <button class="btn btn-danger" (click)="modalController.dismiss()">
                    Cancelar
                  </button>
                </div>
                <div class="col-auto">
                  <button class="btn btn-success" [disabled]="!datosCargados()" (click)="inscribirConcursante()">
                    <div class="spinner-border spinner-border-sm text-primary" role="status" *ngIf="posting"><span class="visually-hidden">Loading...</span></div>
                    <span *ngIf="!posting">Completar Inscripción</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
