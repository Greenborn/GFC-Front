<div [ngClass]="responsiveService.isDesktop ? 'ion-page' : ''">
  <ion-header>
    <ion-toolbar>
      <ion-row class="ion-align-items-center ion-margin-end ion-margin-start">
        <!-- <ion-back-button  text="Volver" [defaultHref]="'/concursos/' + id"></ion-back-button> -->
        <!-- <ion-back-button text="Volver"  (click)="dismiss()"></ion-back-button> -->
        <ion-col>
          <h5 class="ion-text-wrap">
            Inscribir concursante a {{ contest.name }}
          </h5>
        </ion-col>
        <ion-col size="1" class="ion-hide-md-down">
          <ion-button (click)="modalController.dismiss()" fill="clear" class="">
            <ion-icon name="close-outline"></ion-icon>
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-toolbar>
  </ion-header>

  <div slot="start" class="w-100 inner-content ion-float-md-start">
    <ion-grid>
      <ion-row class="ion-justify-content-center ion-align-self-center">
        <ion-col>
          <ion-row>
            <ion-col>
              <ion-row class="ion-padding-top">
                <ion-item *ngIf="concursantes.length > 1; else unicoElemento" class="w-100 ion-margin-bottom">
                  <!-- [position]="(profile_id != undefined) ? 'stacked' : 'floating'" -->
                  

                    <ion-label position="floating">Concursante</ion-label>
                    <app-searchable-select
                      [(ngModel)]="profileContest.profile_id"
                      [items]="concursantes"
                      itemValueField="id"
                      itemTextField="name"
                      placeholder="Seleccionar concursante"
                    ></app-searchable-select>
                 
                </ion-item>
                <ng-template #unicoElemento 
                
                >
                
                <ion-item class="w-100 ion-margin-bottom">
                <ion-label position="floating">Concursante</ion-label>
                <ion-input color="dark"
                [(ngModel)]="concursantes[0].name"
                disabled>
                  
                </ion-input>
              </ion-item>
                </ng-template>
              </ion-row>
              <ion-row class="ion-padding-top">
                <ion-item class="w-100 ion-margin-bottom">
                  <!-- [position]="(profile_id != undefined) ? 'stacked' : 'floating'" -->
                  <ion-label position="floating">Categoría</ion-label>
                  <ion-select [(ngModel)]="profileContest.category_id"  okText="Aceptar" cancelText="Cancelar" ngDefaultControl>
                    <!-- [(value)]="image.profile_id" -->
                    <ion-select-option
                      *ngFor="let c of categorias"
                      [value]="c.id"
                      >{{ c.name }}</ion-select-option
                    >
                  </ion-select>
                </ion-item>
              </ion-row>

              <ion-row class="ion-justify-content-center ion-padding-top">
                <ion-col size="auto">
                  <ion-button color="danger" (click)="modalController.dismiss()">
                    Cancelar
                  </ion-button>
                </ion-col>
                <ion-col size="auto">
                  <ion-button color="success" [disabled]="!datosCargados()" (click)="inscribirConcursante()">
                    <ion-spinner *ngIf="posting" size="small"></ion-spinner>
                    <span *ngIf="!posting">Completar Inscripción</span>
                  </ion-button>
                </ion-col>
              </ion-row>
            </ion-col>
          </ion-row>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</div>
