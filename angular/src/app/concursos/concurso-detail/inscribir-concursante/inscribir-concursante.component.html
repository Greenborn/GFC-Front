<div [ngClass]="responsiveService.isDesktop ? 'gfc-modal-page' : ''">
  <div class="gfc-modal-header">
    <div class="row align-items-center ms-3 me-3">
      <div class="col">
        <h5 class="mb-0">
          Inscribir concursante a {{ contest.name }}
        </h5>
      </div>
      <div class="col-1 d-none d-md-block">
        <button class="btn btn-link" (click)="modalController.dismiss()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="w-100 inner-content float-md-start">
    <div class="container-fluid">
      <div class="row justify-content-center align-self-center">
        <div class="col">
          <div class="row">
            <div class="col">
              <div class="row pt-3">
                @if (concursantes.length > 1) {
                  <div class="mb-3" class="w-100 mb-3">
                    <label class="form-label">Concursante</label>
                    <app-searchable-select
                      [(ngModel)]="profileContest.profile_id"
                      [items]="concursantes"
                      itemValueField="id"
                      itemTextField="name"
                      placeholder="Seleccionar concursante"
                    ></app-searchable-select>
                  </div>
                } @else {
                  <div class="mb-3" class="w-100 mb-3">
                    <label class="form-label">Concursante</label>
                    <input class="form-control" bg-dark text-white
                      [(ngModel)]="concursantes[0].name"
                      disabled>
                  </div>
                }
              </div>
              <div class="row pt-3">
                <div class="mb-3" class="w-100 mb-3">
                  <label class="form-label">Categoría</label>
                  <select class="form-select" [(ngModel)]="profileContest.category_id">
                    @for (c of categorias; track c) {
                      <option
                        [value]="c.id"
                      >{{ c.name }}</option>
                    }
                  </select>
                </div>
              </div>

              <div class="row justify-content-center pt-3">
                <div class="col-auto">
                  <button class="btn btn-outline-secondary" (click)="modalController.dismiss()">
                    Cancelar
                  </button>
                </div>
                <div class="col-auto">
                  <button class="btn btn-success" [disabled]="!datosCargados()" (click)="inscribirConcursante()">
                    @if (posting) {
                      <div class="spinner-border spinner-border-sm text-primary" role="status"><span class="visually-hidden">Loading...</span></div>
                    }
                    @if (!posting) {
                      <span>Completar Inscripción</span>
                    }
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
