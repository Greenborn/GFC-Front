<div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-3" *ngIf="mostrarFiltro">
        <div class="col">
          <ion-title class="mt-3">Búsqueda</ion-title>

          <ion-list>
            <ion-radio-group value="biff">
              <ion-list-header>
                <ion-label>Filtrar por:</ion-label>
              </ion-list-header>

              <ion-item lines="none">
                <ion-label>Nombre</ion-label>
                <ion-radio slot="start" value="nombre"></ion-radio>
              </ion-item>

              <ion-item lines="none">
                <ion-label>Código</ion-label>
                <ion-radio slot="start" value="codigo"></ion-radio>
              </ion-item>

              <ion-item lines="none">
                <ion-label>Concursante</ion-label>
                <ion-radio slot="start" value="concursante"></ion-radio>
              </ion-item>

              <ion-item lines="none" *ngIf="!isContestNotFin || !rolificador.esConcursante(u)">
                <ion-label>Fotoclub/Agrupación/Institución</ion-label>
                <ion-radio slot="start" value="fotoclub"></ion-radio>
              </ion-item>
            </ion-radio-group>
          </ion-list>

          <div class="row">
            <div class="col">
              <ion-fab-button size="small">
                <ion-icon name="arrow-forward-circle"></ion-icon>
              </ion-fab-button>
            </div>
          </div>

          <div class="col">
            
            <ion-list>
              <ion-list-header>
                <ion-label>Premio:</ion-label>
              </ion-list-header>
              <ion-item
                ><button class="btn btn-link" href="#">Reprobado</button></ion-item
              >
              <ion-item
                ><button class="btn btn-link" href="#">Aprobado</button></ion-item
              >
              <ion-item>
                <button class="btn btn-link" href="#">Mención</button></ion-item
              >
              <ion-item>
                <button class="btn btn-link" href="#">Medalla Oro</button></ion-item
              >
              <ion-item>
                <button class="btn btn-link" href="#">Medalla Plata</button></ion-item
              >
              <ion-item>
                <button class="btn btn-link" href="#">Medalla Bronce</button></ion-item
              >
            </ion-list>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="row">
          <div class="col-12">
            <div class="row justify-content-start align-items-center mt-3 mb-3">
              <h1 class="mt-3 mb-3 me-3">
                Fotografías
              </h1>
              <ion-fab-button size="small" (click)="postImage()">
                <ion-icon name="add"></ion-icon>
              </ion-fab-button>
            </div>

            <div class="row align-items-center">
              <div class="col-11"
                ><app-search-bar [atributos]="['Titulo', 'Codigo']">
                </app-search-bar
              ></div>
              <div class="col-1">
                <button class="btn btn-secondary" (click)="toggleFiltro()">
                  <ion-icon name="funnel"></ion-icon>
                </button></div
              >
            </div>
            <div class="container-fluid">
              <div class="row pe-3">
                <div class="col-6 col-md-3">Obra</div>
                <div class="d-none d-md-block ps-3 col-4 col-md-3"
                  >Autor</div
                >
                <div class="text-center col-3 col-md-2"
                  >Premio</div
                >

                <div class="col-2"></div>
              </div>
            </div>
            <ion-list>
              <ion-item class="p-0">
                <div class="container-fluid" *ngIf="resultadosConcurso.length > 0; else texto">

                  <div class="row" *ngFor="let r of resultadosConcurso">
                    <div class="col-6 col-md-3 align-self-center">
                      <ion-card-subtitle title="Código de la obra"
                      >{{ r.image.code }}</ion-card-subtitle>

                      <ion-text title="Nombre de la obra"
                      ><b>{{ r.image.title }}</b></ion-text>
                      
                    </div>
                    <div class="d-none d-md-block text-center align-self-center col-4 col-md-3">
                      <ion-item lines="none">
                        <ion-label>
                          <ion-card-subtitle title="Fotoclub/Agrupación del autor"
                          >{{ getFotoclubName(r.image.profile_id) }}</ion-card-subtitle>
                          
                          <ion-text title="Autor de la obra">
                            <b>{{ getFullName(r.image.profile_id) }}</b>
                          </ion-text>
                          
                        </ion-label>
                      </ion-item>
                    </div>
                    <div class="text-center align-self-center col-3 col-md-2">
                      <ion-text>{{ r.metric.prize }}</ion-text>
                    </div>
                    

                    <div class="col-1 col-md-2 align-self-center">
                      <div class="d-flex gap-1 d-none d-lg-block justify-content-end">
                        <button class="btn btn-outline-primary" (click)="reviewImage(r)">
                          <ion-icon name="star-outline"></ion-icon>
                        </button>
                        <button class="btn btn-outline-primary" (click)="postImage(r.image)">
                          <ion-icon name="create"></ion-icon>
                        </button>
                        <button class="btn btn-outline-primary" (click)="deleteImage(r.image_id, r.id, r.metric_id)">
                          <ion-icon name="trash"></ion-icon>
                        </button>
                      </div>
                      <div class="d-flex gap-1 d-lg-none">
                        <button class="btn btn-outline-primary" (click)="mostrarAcciones($event, r)">
                          <ion-icon
                            ios="ellipsis-horizontal"
                            md="ellipsis-vertical"
                          ></ion-icon>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
                <ng-template #texto>No hay fotografias</ng-template>
              </ion-item>
            </ion-list>
          </div>
        </div>
      </div>
    </div>
  </div>
