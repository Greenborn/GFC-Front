<ion-content>
  <div class="container concursos-grid" *ngIf=" (auth.user | async) as userLogged">
    <div class="row align-items-center mt-3 mb-3">
      <div class="col-auto" *ngIf="isLogedIn()">
        <div class="d-flex align-items-center gap-2">
          <h1 class="m-0">
            Concursos
          </h1>

          <button
            class="btn btn-primary"
            *ngIf="(rolificador.esDelegado(userLogged) || rolificador.isAdmin(userLogged))"
            [routerLink]="['nuevo']"
          >
            <ion-icon name="add" class="me-1"></ion-icon> Nuevo
          </button>
        </div>
      </div>

      <div class="col">
        <app-search-bar
          (buscar)="buscarConcursos($event)"
          [atributosObj]="atributosBusqueda"
          [hideFieldSelector]="true"
        >
        </app-search-bar>
      </div>
    </div>

    <div class="row align-items-center pb-3">
              <div class="col p-0 col-10 col-sm-11">
                <button
                  class="btn btn-outline-primary"
                  [routerLink]="['secciones']"
                  *ngIf="rolificador.esDelegado(userLogged) || rolificador.isAdmin(userLogged)"
                  >Administrar secciones</button
                >

                <button
                  class="btn btn-outline-primary"
                  [routerLink]="['metricas']"
                  *ngIf="rolificador.esDelegado(userLogged) || rolificador.isAdmin(userLogged)"
                  >Administrar Puntajes</button>
              </div>
            </div>
            <ion-list
              *ngIf="itemGroups.length > 0; else (loading ? spinner : texto)"
            >
            
              <ng-container *ngFor="let group of itemGroups; index as gi">
              <ng-container *ngFor="let item of group; trackBy: trackByItem; index as i">
                <ion-card
                  *ngIf="item.tipo === 'concurso'"
                  class="cc-card"
                  [ngStyle]="{'background-image': 'url(' + getImg(item.concurso.img_url) + ')'}"
                >
                  <div class="cc-overlay"></div>
                  <div class="cc-body">
                    <span class="cc-badge" [class.cc-badge--open]="item.concurso.active" [class.cc-badge--closed]="!item.concurso.active">{{ item.concurso.active ? 'Abierto' : 'Cerrado' }}</span>
                    <h2 class="cc-title">{{item.concurso.name}}</h2>
                    <p class="cc-meta">
                      Desde: {{get_fecha_formateada(item.concurso.start_date) }} - Hasta:
                      {{get_fecha_formateada(item.concurso.end_date)}}
                    </p>
                    <p class="cc-desc">{{item.concurso.description}}</p>
                    <div class="cc-tags" *ngIf="item.concurso.categories?.length">
                      <span class="cc-tag" *ngFor="let c of item.concurso.categories">{{c.name}}</span>
                    </div>
                    <div class="cc-tags" *ngIf="item.concurso.sections?.length">
                      <span class="cc-tag" *ngFor="let s of item.concurso.sections">{{s.name}}</span>
                    </div>
                    <div class="cc-actions">
                      <button
                        class="cc-btn btn btn-outline-primary btn-sm"
                        size="small"
                        [routerLink]="[item.concurso.id, 'fotografias']"
                      >
                        <ion-icon name="images-outline"></ion-icon>
                        Fotografías
                      </button>
                      <button
                        class="cc-btn btn btn-outline-primary btn-sm"
                        size="small"
                        [routerLink]="[item.concurso.id]"
                      >Ver concurso</button>
                    </div>
                  </div>
                </ion-card>

                <app-fotos-anio-card
                  *ngIf="item.tipo === 'fotos-anio'"
                  [fotos]="item.fotosAnio"
                  [temporada]="item.temporada"
                  [url_grabacion]="item.url_grabacion"
                ></app-fotos-anio-card>
              </ng-container>
            </ng-container>
            </ion-list>
            <ion-infinite-scroll threshold="100px" (ionInfinite)="loadMoreConcursos($event)" [disabled]="!hasMoreConcursos && allItems.length === 0">
              <ion-infinite-scroll-content loadingSpinner="bubbles" loadingText="Cargando más concursos..."></ion-infinite-scroll-content>
            </ion-infinite-scroll>
            <ng-template #texto>
              <ion-item>No se encontraron concursos</ion-item>
            </ng-template>
            <ng-template #spinner>
              <div class="row justify-content-center">
                <ion-spinner></ion-spinner>
              </div>
            </ng-template>
  </div>
</ion-content>
