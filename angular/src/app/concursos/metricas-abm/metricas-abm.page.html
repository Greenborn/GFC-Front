<ion-header>
  <ion-toolbar>
    <div class="container-fluid">
      <div class="row justify-content-end">
        <div class="col-12">
          <div class="row">
            <ion-buttons>
              <ion-back-button text="Volver" defaultHref="/concursos"></ion-back-button>
            </ion-buttons>
          </div>
        </div>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="container-fluid p-0 m-0">
    <div class="row justify-content-center">
      <div class="col-3" *ngIf="mostrarFiltro">
        <div class="row">
          <div class="col">
            <ion-title class="mt-3">Búsqueda</ion-title>

            <app-search-bar
              [(data)]="metricas"
              [atributosObj]="atributosBusqueda"
            ></app-search-bar>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="row">
          <div class="col-12">
            <div class="row justify-content-start align-items-center mt-3 mb-3">
              <h1 class="mt-3 mb-3 me-3">
                Premios
              </h1>
              <ion-fab-button size="small" (click)="post()">
                <ion-icon name="add"></ion-icon>
              </ion-fab-button>
            </div>
            <ion-list class="p-0">
              <ion-item color="dark">
                <div class="container-fluid">
                  <div class="row pe-3">
                    <div class="col-6 col-md-5">
                      <div class="row">
                        <app-th-sort
                          [sortFn]="ordenarPorPremio"
                          [(data)]="metricas"
                          title="Premio"
                        ></app-th-sort>
                      </div>
                    </div>

                    <div class="col-5">
                      <div class="row">
                        <app-th-sort
                          [sortFn]="ordenarPorPuntaje"
                          [(data)]="metricas"
                          title="Puntaje"
                        ></app-th-sort>
                      </div>
                    </div>
                  </div>
                </div>
              </ion-item>
            </ion-list>
            <ion-list class="p-0">
              <ion-item lines="none" class="p-0 lista-elem">
                <div class="container-fluid p-0" *ngIf="metricas.length > 0; else texto">
                  <div class="container-fluid p-0">
                    <div class="row">
                      <div class="col align-self-start">
                        <ion-item-group *ngFor="let s of metricas">
                          <ion-item-divider lines="full" mode="ios" style="--inner-padding-end: 16px">
                            <div class="row w-100">
                              <div class="col-6 col-md-5">
                                <h4 class="mt-3 mb-3"> <b>{{ s.prize }}</b></h4>
                              </div>
                              <div class="col-5">
                                <h4 class="mt-3 mb-3"> <b>{{ s.score }}</b></h4>
                              </div>
                              <div class="col-1 col-md-2 align-self-center">
                                <ion-buttons class="justify-content-end">
                                  <div class="d-none d-md-block">
                                    <ion-button title="Editar premio" (click)="post(s)" color="dark">
                                      <ion-icon name="create"></ion-icon>
                                    </ion-button>
                                    <ion-button title="Eliminar premio" (click)="delete(s)" color="dark">
                                      <ion-icon name="trash"></ion-icon>
                                    </ion-button>
                                  </div>
                                  <div class="d-md-none">
                                    <ion-button color="dark"
                                      (click)="mostrarAcciones($event, s)"
                                    >
                                      <ion-icon 
                                        slot="icon-only"
                                        ios="ellipsis-horizontal"
                                        md="ellipsis-vertical"
                                      ></ion-icon>
                                    </ion-button>
                                  </div>
                                </ion-buttons>
                              </div>
                            </div>
                          </ion-item-divider>
                        </ion-item-group>
                      </div>
                    </div>
                  </div>
                </div>
                <ng-template #texto>No hay premios</ng-template>
              </ion-item>
            </ion-list>
          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>
