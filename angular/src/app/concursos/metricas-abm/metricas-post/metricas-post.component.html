<div [ngClass]="responsiveService.isDesktop ? 'ion-page' : ''">
  <div class="bg-light border-bottom p-3">
    <div class="row align-items-center me-3">
      <div class="col-2 d-md-none">
        <button class="btn btn-link" (click)="modalController.dismiss()">
          <i class="bi bi-arrow-left"></i>
        </button>
      </div>
      <div class="col" [ngClass]="{'ms-3': responsiveService.isDesktop}">
        <h5 class="mb-0">
          {{ formTitle }}
        </h5>
      </div>
      <div class="col-1 d-none d-md-block">
        <button class="btn btn-link" (click)="modalController.dismiss()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
    </div>
  </div>

  <div slot="start" class="w-100 inner-content float-md-start">
    <div class="container-fluid">
      <div class="row justify-content-center align-self-center">
        <div class="col">
          <div class="row">
            <div class="col">
              <div class="row">
                <div class="col">
                  <form
                    #metricForm="ngForm"
                    (ngSubmit)="post(metricForm)"
                  >
                    <ion-item class="w-100">
                      <ion-label position="floating">Premio</ion-label>
                      <ion-input
                        [ngModel]="metric.prize"
                        name="prize"
                        required
                      ></ion-input>
                    </ion-item>

                    <ion-item class="w-100">
                      <ion-label position="floating">Puntaje</ion-label>
                      <ion-input
                        [ngModel]="metric.score"
                        name="score"
                        required
                      ></ion-input>
                    </ion-item>

                    <ion-item class="w-100">
                      <ion-label>Tipo de organización</ion-label>
                      <ion-select
                        [ngModel]="metric.organization_type"
                        name="organization_type"
                        required
                        okText="Aceptar"
                        cancelText="Cancelar"
                      >
                        <ion-select-option value="INTERNO">Interno</ion-select-option>
                        <ion-select-option value="EXTERNO">Externo</ion-select-option>
                        <ion-select-option value="EXTERNO_0">Externo 0</ion-select-option>
                        <ion-select-option value="EXTERNO_UNICEN">Externo UNICEN</ion-select-option>
                      </ion-select>
                    </ion-item>

                    <div class="row justify-content-end">
                      <div class="col-12">
                        <div class="row justify-content-end">
                          <div class="col-12 col-sm-3 align-self-center">
                            <app-btn-post
                              [posting]="posting"
                              [disabled]="!datosCargados(metricForm)"
                            ></app-btn-post>
                          </div>

                          <div class="col-12 col-sm-3 align-self-center">
                            <button
                              class="btn btn-link w-100"
                              (click)="modalController.dismiss()"
                            >Cancelar</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
