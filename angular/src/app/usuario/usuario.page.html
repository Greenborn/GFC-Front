<div class="bg-light border-bottom p-3">
  <div class="d-flex align-items-center gap-1">
    <button class="btn btn-outline-dark btn-sm d-md-none" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
    <h5 class="mb-0">Perfil</h5>
  </div>
</div>

<div class="container-fluid py-3">
          <ion-item 
          
          lines="none"
            *ngIf="authUser as u">
            <div class="col">
              <div class="row justify-content-center align-items-center">
                <div class="col-11 align-items-center"> 
                  <app-usuario-img [src]="userProfile?.img_url ? configService.imageUrl(userProfile.img_url) : ''"></app-usuario-img>
                </div>
              </div>
              <div class="row">
                <div class="col justify-content-center">
                  <ion-card-title class="text-center"
                    >{{ u.username }}</ion-card-title
                  >

                  <ion-card-subtitle class="text-center"
                    >{{userProfile?.name || ''}}
                    {{userProfile?.last_name || ''}}</ion-card-subtitle
                  >
                </div>
              </div>
            </div>
          </ion-item>

</div>
          <footer class="bg-light border-top p-2">
                <ion-list>    
   
   
                  <ion-item 
                  lines="none"
                >
                  <i class="bi bi-moon-outline"></i>
                  <div class="form-check form-switch"><input type="checkbox" class="form-check-input" [checked]="darkMode"></div>
   
                </ion-item>
                <ion-item
                  lines="none"
                  [routerLink]="['/usuarios', 'editar', authService.userId]"
                >
                  <i class="bi bi-person"></i>
                  <ion-label>Editar perfil</ion-label>
                </ion-item>
   
   
                  <ion-item
                    lines="none"
                    (click)="authService.logout()"
                    button="true"
                  >
                    <i class="bi bi-log-out-outline"></i>
                    <ion-label>Salir</ion-label>
                  </ion-item>
                </ion-list>

                <div class="version-text">v{{ version }}</div>
              
          </footer>
