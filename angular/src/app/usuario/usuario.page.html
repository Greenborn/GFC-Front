<div class="p-3 text-center border-bottom">
  @if (authUser; as u) {
    <div>
      <app-usuario-img [src]="userProfile?.img_url ? configService.imageUrl(userProfile.img_url) : ''" style="max-width:64px;display:inline-block"></app-usuario-img>
      <h6 class="mt-2 mb-0">{{ u.username }}</h6>
      <small class="text-muted">{{userProfile?.name || ''}} {{userProfile?.last_name || ''}}</small>
    </div>
  }
</div>

<div class="list-group list-group-flush">
  <div class="list-group-item list-group-item-action d-flex align-items-center gap-3 clickeable" (click)="darkMode = !darkMode">
    <i class="bi bi-moon"></i>
    <span class="flex-grow-1">Modo oscuro</span>
    <div class="form-check form-switch mb-0">
      <input type="checkbox" class="form-check-input" [checked]="darkMode" (click)="darkMode = !darkMode; $event.stopPropagation()">
    </div>
  </div>

  <div class="list-group-item list-group-item-action d-flex align-items-center gap-3 clickeable" [routerLink]="['/usuarios', 'editar', authService.userId]">
    <i class="bi bi-person"></i>
    <span>Editar perfil</span>
  </div>

  <div class="list-group-item list-group-item-action d-flex align-items-center gap-3 clickeable text-danger" (click)="authService.logout()">
    <i class="bi bi-box-arrow-right"></i>
    <span>Salir</span>
  </div>
</div>

<div class="text-center py-2">
  <small class="text-muted" style="font-size:0.7rem">v{{ version }}</small>
</div>
