<div class="bg-light border-bottom p-3">
  <div class="d-flex align-items-center gap-1">
    <button class="btn btn-outline-dark btn-sm" onclick="history.back()"><i class="bi bi-arrow-left"></i> Volver</button>
    <h5 class="mb-0">Editar Perfil</h5>
  </div>
</div>

<div class="container-fluid py-3"
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10">
        <form #f="ngForm" (ngSubmit)="editUsuario(f)">
          <div class="row justify-content-center">
            <app-usuario-img [src]="usuario.img_url"></app-usuario-img>
          </div>
          <ion-item class="pt-3">
            <ion-label position="floating">Nombre</ion-label>
            <ion-input
              class="expand-full"
              name="username"
              [ngModel]="usuario.username"
              autocapitalize="words"
              required
            ></ion-input>
          </ion-item>
          <ion-item>
            <ion-label position="floating">Email</ion-label>
            <ion-input
              class="expand-full"
              name="email"
              type="email"
              [ngModel]="usuario.email"
              required
            ></ion-input>
          </ion-item>
          <ion-item>
            <ion-label position="floating">Imagen(url)</ion-label>
            <ion-input
              class="expand-full"
              name="img_url"
              [(ngModel)]="usuario.img_url"
              required
            ></ion-input>
          </ion-item>
          <button class="btn btn-outline-primary w-100" type="submit" [disabled]="!f.valid">Guardar</button>
        </form>
      </div>
    </div>
  </div>
</div>
