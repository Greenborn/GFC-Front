<div class="bg-light border-bottom p-3">
  <div class="d-flex align-items-center gap-1">
    <button class="btn btn-dark btn-sm" onclick="history.back()"><i class="bi bi-arrow-left"></i> Volver</button>
    <h5 class="mb-0">Editar Perfil</h5>
  </div>
</div>

<div class="container-fluid py-3">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form #f="ngForm" (ngSubmit)="editUsuario(f)">
            <div class="text-center mb-4">
              <app-usuario-img [src]="usuario.img_url" style="max-width:120px;display:inline-block"></app-usuario-img>
            </div>

            <div class="mb-3">
              <label class="form-label fw-medium">Nombre</label>
              <input class="form-control"
                name="username"
                [ngModel]="usuario.username"
                autocapitalize="words"
                required
              >
            </div>

            <div class="mb-3">
              <label class="form-label fw-medium">Email</label>
              <input class="form-control"
                name="email"
                type="email"
                [ngModel]="usuario.email"
                required
              >
            </div>

            <div class="mb-4">
              <label class="form-label fw-medium">Imagen (URL)</label>
              <input class="form-control"
                name="img_url"
                [(ngModel)]="usuario.img_url"
                required
              >
            </div>

            <button class="btn btn-success w-100" type="submit" [disabled]="!f.valid">Guardar</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
