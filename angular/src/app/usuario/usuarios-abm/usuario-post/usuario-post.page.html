<div class="container-fluid py-3">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-10 col-xl-9">
      <form class="w-100" [formGroup]="form" (ngSubmit)="postUsuario()">
        <div class="row g-4">
          <div class="col-12 col-md-4">
            <div class="card h-100">
              <div class="card-header">
                <h5 class="card-title mb-0">Foto de perfil</h5>
              </div>
              <div class="card-body d-flex flex-column align-items-center">
                <app-usuario-img [src]="img_url" [imageChangeEnabled]="true" [imageChangeClick]="ImageChangeClick"></app-usuario-img>
                <div class="mt-3 w-100">
                  <button class="btn btn-warning w-100 btn-sm" type="button" (click)="ProfileImageUpload.click()">
                    Cambiar imagen
                  </button>
                  <input #ProfileImageUpload type="file" accept="image/*" style="display:none" (change)="fileUpload($event.target)">
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-8">
            <div class="card h-100">
              <div class="card-header">
                <h5 class="card-title mb-0">Datos del perfil</h5>
              </div>
              <div class="card-body">
                <div class="row g-3">
                  <div class="col-12 col-sm-6">
                    <label class="form-label">Nombre</label>
                    <input class="form-control" formControlName="name" autocapitalize="words" required>
                  </div>
                  <div class="col-12 col-sm-6">
                    <label class="form-label">Apellido</label>
                    <input class="form-control" formControlName="last_name" autocapitalize="words" required>
                  </div>
                  <div class="col-12 col-sm-6">
                    <label class="form-label">DNI</label>
                    <input class="form-control" formControlName="dni" required>
                  </div>
                  <div class="col-12 col-sm-6">
                    <label class="form-label">Fotoclub/Agrupación/Institución</label>
                    <select class="form-select" #sFotoclub formControlName="fotoclub_id" required>
                      <option *ngFor="let f of fotoclubes" [value]="f.id">{{f.name}}</option>
                    </select>
                  </div>
                  <div class="col-12" *ngIf="isAdmin">
                    <div class="form-check">
                      <input type="checkbox" class="form-check-input" id="executive" formControlName="executive">
                      <label class="form-check-label" for="executive">Es miembro de la comisión directiva</label>
                    </div>
                  </div>
                  <div class="col-12 col-sm-6" *ngIf="isAdmin && profileExecutive()">
                    <label class="form-label">Rol en la comisión</label>
                    <input class="form-control" formControlName="executive_rol" autocapitalize="words" required>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title mb-0">Datos del usuario</h5>
              </div>
              <div class="card-body">
                <div class="row g-3">
                  <div class="col-12 col-sm-6">
                    <label class="form-label">Nombre de Usuario</label>
                    <input class="form-control" (focus)="usernameFocus=true" (blur)="usernameFocus=false"
                      autocapitalize="off" pattern="[a-zA-Z0-9]{1,20}"
                      formControlName="username" required>
                    <small class="text-muted" *ngIf="usernameFocus">
                      Máximo 20 caracteres alfanuméricos sin símbolos ni espacios
                    </small>
                  </div>
                  <div class="col-12 col-sm-6">
                    <label class="form-label">E-Mail</label>
                    <input class="form-control" autocapitalize="off"
                      pattern="[\-a-zA-Z0-9~!$%^&amp;*_=+\}\{'?]+(\.[\-a-zA-Z0-9~!$%^&amp;*_=+\}\{'?]+)*@[a-zA-Z0-9_][\-a-zA-Z0-9_]*(\.[\-a-zA-Z0-9_]+)*\.[cC][oO][mM](:[0-9]{1,5})?"
                      formControlName="email" required>
                  </div>

                  <ng-container *ngIf="isPost && (!isLogged() || userLogged?.role_id === 1 || userLogged?.role_id === 2)">
                    <div class="col-12 col-sm-6">
                      <label class="form-label">Contraseña</label>
                      <div class="input-group">
                        <input class="form-control" id="ctr-1" pattern=".{8,}" type="password"
                          formControlName="password">
                        <app-ojo inputId="ctr-1"></app-ojo>
                      </div>
                    </div>
                  </ng-container>

                  <ng-container *ngIf="!isUserProfile && isUserSignUp">
                    <div class="col-12 col-sm-6">
                      <label class="form-label">Repetir Contraseña</label>
                      <input class="form-control" type="password" formControlName="passwordRepeat">
                    </div>
                  </ng-container>

                  <div class="col-12">
                    <small class="text-muted" *ngIf="form.get('passwordRepeat')?.dirty || form.get('password')?.dirty">
                      <p *ngIf="form.get('passwordRepeat')?.errors?.['mustMatch']">- Atención: Las contraseñas no coinciden</p>
                      <p *ngIf="form.get('password')?.errors?.['pattern']">- Atención: Longitud mínima 8 caracteres</p>
                    </small>
                  </div>

                  <div class="col-12" *ngIf="!isPost && isLogged()">
                    <button class="btn btn-warning" type="button" (click)="changePassword()">Cambiar contraseña</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12" *ngIf="!isUserProfile && isLogged() && !updatingSelect">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title mb-0">Configuración</h5>
              </div>
              <div class="card-body">
                <div class="row g-3">
                  <div class="col-12 col-sm-6">
                    <label class="form-label">Rol</label>
                    <select class="form-select" #sRol formControlName="role_id" required>
                      <option *ngFor="let r of roles" [value]="r.id">{{r.type}}</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12">
            <div class="d-flex justify-content-center justify-content-md-between gap-2">
              <button class="btn btn-outline-dark" type="button" onclick="history.back()">Cancelar</button>
              <app-btn-post [posting]="posting" [text]="submitBtnText"></app-btn-post>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<ng-template #spinner>
  <div class="row justify-content-center" *ngIf="(usuario.role_id == 3 || usuario.role_id == 2)">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
  </div>
</ng-template>
